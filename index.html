<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catma Bar</title>
<style>

html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:sans-serif;}
  
#hero{
  width:100%;
  height:100vh;
  position:relative;
  overflow:hidden;
  transition: filter 2s ease;
}


#hero-text{
  position: absolute;
  top: 150px; /* distanza dal top, puoi regolare */
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  color: #fff;
  z-index: 90; /* sopra i layer, sotto il menu */
  pointer-events: none; /* non interferisce con click sugli hotspot */
  text-shadow: 1px 1px 5px #000;
}

#hero-text .subtitle{
  font-size: 1.5vw; /* dimensione piccola, proporzionale */
  margin: 0;
  opacity: 0.8;
}

#hero-text .title{
  font-size: 3vw; /* titolo più grande */
  margin: 5px 0 0 0;
  font-weight: bold;
}

#hero-text .title-big{
  font-size: 4vw; /* titolo più grande */
  margin: 0 0 0 0;
  font-weight: bold;
}

/* MEDIA QUERY per mobile */
@media(max-width:768px){
  #hero-text{
    top: 80px; /* leggermente più vicino al top su mobile */
  }
  #hero-text .subtitle{
    font-size: 3vw;
  }
  #hero-text .title{
    font-size: 6vw;
  }
}

/* LAYERS */
.layer {
  position: absolute;
  width: 120%;
  height: 120%;
  top: -10%;
  left: -10%;
  object-fit: cover;
  pointer-events: none;
  transition: transform 0.5s ease;
}

/* HOTSPOTS */
.hotspot{
 position:absolute;
 width:50px;height:50px;
 border-radius:50%;
 background:#b22222;
 box-shadow:0 0 20px rgba(178,34,34,.9);
 transform:translate(-50%,-50%);
 animation:pulse 2s infinite;
 cursor:pointer;
 z-index:50;
}
@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}
}

/* MENU DESKTOP */
#menu{
 position:absolute;
 top:20px;
 left:50%;
 transform:translateX(-50%);
 width:90%;
 display:flex;
 align-items:center;
 z-index:100;
}
#menu a{
 flex:1;
 text-align:center;
 color:#fff;
 text-decoration:none;
}
.logo-center{
 flex:1;
 display:flex;
 justify-content:center;
}
.logo-center img{height:60px}

/* MOBILE */
#mobile-logo{
 display:none;
 position:absolute;
 top:20px;left:20px;
 height:40px;
 z-index:101;
}
#hamburger{
 display:none;
 position:absolute;
 top:20px;right:20px;
 width:30px;height:25px;
 flex-direction:column;
 justify-content:space-between;
 cursor:pointer;
 z-index:101;
}
#hamburger div{height:4px;background:#fff}

#mobile-menu{
 display:none;
 position:fixed;
 width:100%;height:100%;
 background:rgba(0,0,0,.9);
 justify-content:center;
 align-items:center;
 flex-direction:column;
 z-index:800;
}
#mobile-menu a{
 color:#fff;
 margin:15px 0;
 font-size:1.5rem;
 text-decoration:none;
 text-transform:uppercase;
}
#mobile-menu .cta{
 border:2px solid #fff;
 padding:12px 25px;
 border-radius:30px;
 margin-top:20px;
}
#mobile-menu img{
 height:60px; /* logo ridotto */
 margin-bottom:20px;
}
.close-btn{
 position:absolute;
 top:20px;right:20px;
 font-size:2rem;
 color:#fff;
 cursor:pointer;
}

/* OVERLAY */
#content-overlay{
 display:none;
 position:fixed;
 width:100%;height:100%;
 background:rgba(0,0,0,.75);
 justify-content:center;
 align-items:center;
 z-index:700;
}
.content-box{
 color:#fff;
 text-align:center;
 transform:scale(0);
 transition:transform 0.4s ease;
}

/* MEDIA */
@media(max-width:768px){
 #menu{display:none}
 #hamburger{display:flex}
 #mobile-logo{display:block}
 .hotspot{width:40px;height:40px;}
}

.hotspot.hidden{
 opacity:0;
 pointer-events:none;
}

#gyroBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 250px;       /* larghezza maggiore */
  height: 50px;       /* altezza maggiore */
  background: #b22222;
  color: #fff;
  border: none;
  border-radius: 150px;
  z-index: 99999;     /* molto alto */
  font-size: 1.5rem;  /* testo più grande */
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  transition: opacity 0.3s ease, transform 0.2s ease;
}
  
#gyroBtn.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0.8);
}

#gyroOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.7); /* scurisce la scena */
  z-index: 99998;               /* subito sotto il pulsante */
  pointer-events: none;         /* clic passano al pulsante */
  opacity: 0;
  transition: opacity 0.3s ease;
}
  
#gyroOverlay.active {
  opacity: 1;
}

/* FILTRI TEMPO */

body[data-time="giorno"] #hero {
  filter: brightness(1.2) saturate(0.35) hue-rotate(-5deg);
  /* luce più fredda e meno saturata per effetto naturale */
}

body[data-time="sera"] #hero {
  filter: brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2);
  /* luce calda tipo candele */
}

body[data-time="chiuso"] #hero {
  filter: brightness(0.2) saturate(0.5);
}

/* Pulsanti controllo tempo */
#timeControls {
  position: fixed;
  bottom: 50%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  z-index: 650;
}

#timeControls button {
  padding: 10px 20px;
  border: none;
  border-radius: 150px;
  background: #b22222;
  color: white;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: background 0.3s ease;
}

#timeControls button:hover { background: #ff4d4d; }

@media(min-width:769px){
 .mobile-layer{display:none}
}
</style>
</head>

<script>
// ELEMENTI PRINCIPALI
const hero = document.getElementById('hero');
let layers = {};
let mouseX = 0, mouseY = 0, isZoomed = false;

const hotspots = document.querySelectorAll('.hotspot');
const overlay = document.getElementById('content-overlay');
const contentBox = overlay.querySelector('.content-box');
const title = document.getElementById('title');

const map = {
  chi: {label:'CHI SIAMO', key:'chi'},
  mescita: {label:'MESCITA', key:'mescita'},
  prenota: {label:'PRENOTA', key:'prenota'},
  eventi: {label:'EVENTI', key:'eventi'},
  bar: {label:'BAR', key:'bar'}
};

// --- LAYERS ---
function setLayers() {
  const isMobile = 'ontouchstart' in window;
  layers = isMobile ? {
    background: hero.querySelector('.mobile-layer.background'),
    midground: hero.querySelector('.mobile-layer.midground'),
    foreground: hero.querySelector('.mobile-layer.foreground')
  } : {
    background: hero.querySelector('.desktop-layer.background'),
    midground: hero.querySelector('.desktop-layer.midground'),
    foreground: hero.querySelector('.desktop-layer.foreground')
  };
  updateHotspots();
}

// --- HOTSPOTS BASE POSITION ---
function updateHotspots() {
  const isMobile = 'ontouchstart' in window;

  hotspots.forEach(h => {
    const ox = isMobile 
      ? h.dataset.xMobile/100 * hero.clientWidth
      : h.dataset.xDesktop/100 * hero.clientWidth;

    const oy = isMobile 
      ? h.dataset.yMobile/100 * hero.clientHeight
      : h.dataset.yDesktop/100 * hero.clientHeight;

    h.dataset.ox = ox;
    h.dataset.oy = oy;
  });

  updateParallax(mouseX, mouseY);
}

// --- PARALLAX ---
function updateParallax(x, y) {

  const maxOffset = {
    background:{x:40,y:20},
    midground:{x:60,y:30},
    foreground:{x:80,y:40}
  };

  const isMobile = 'ontouchstart' in window;
  const scaleFix = isMobile ? 1.08 : 1;

  // LAYERS
  layers.background.style.transform = `
    translate(${x*maxOffset.background.x}px, ${y*maxOffset.background.y}px)
    scale(${scaleFix})
  `;

  layers.midground.style.transform = `
    translate(${x*maxOffset.midground.x}px, ${y*maxOffset.midground.y}px)
    scale(${scaleFix})
  `;

  layers.foreground.style.transform = `
    translate(${x*maxOffset.foreground.x}px, ${y*maxOffset.foreground.y}px)
    scale(${scaleFix})
  `;

  // 👇 HOTSPOT LEGATI AL MIDGROUND (FIX DEFINITIVO)
  const refX = x * maxOffset.midground.x;
  const refY = y * maxOffset.midground.y;

  hotspots.forEach(h => {
    if(h.classList.contains('hidden')) return;

    const ox = parseFloat(h.dataset.ox);
    const oy = parseFloat(h.dataset.oy);

    h.style.left = ox + refX + 'px';
    h.style.top  = oy + refY + 'px';
  });
}

// --- ZOOM HOTSPOTS ---
function zoomTo(key) {
  const h = Array.from(hotspots).find(el => el.dataset.key === key);
  if(!h) return;

  const tx = parseFloat(h.dataset.ox);
  const ty = parseFloat(h.dataset.oy);

  const cx = hero.clientWidth/2;
  const cy = hero.clientHeight/2;

  const dx = cx - tx;
  const dy = cy - ty;

  layers.background.style.transform = `translate(${dx*0.3}px,${dy*0.3}px) scale(1.1)`;
  layers.midground.style.transform = `translate(${dx*0.6}px,${dy*0.6}px) scale(1.25)`;
  layers.foreground.style.transform = `translate(${dx}px,${dy}px) scale(1.5)`;

  isZoomed = true;
  title.innerText = map[key].label;

  overlay.style.display = 'flex';
  hotspots.forEach(h => h.classList.add('hidden'));
  contentBox.style.transform = 'scale(1)';
}

function resetZoom() {
  isZoomed = false;

  overlay.style.display = 'none';
  contentBox.style.transform = 'scale(0)';

  hotspots.forEach(h => h.classList.remove('hidden'));
  updateParallax(mouseX, mouseY);
}

// --- MOUSE DESKTOP ---
hero.addEventListener('mousemove', e => {
  if('ontouchstart' in window) return;

  const r = hero.getBoundingClientRect();
  mouseX = (e.clientX - r.left)/r.width - 0.5;
  mouseY = (e.clientY - r.top)/r.height - 0.5;

  if(!isZoomed) updateParallax(mouseX, mouseY);
});

// --- CLICK HOTSPOTS ---
hotspots.forEach(h => {
  h.addEventListener('click', () => zoomTo(h.dataset.key));
});

document.querySelectorAll('#menu a, #mobile-menu a').forEach(a => {
  a.addEventListener('click', e => {
    e.preventDefault();
    zoomTo(a.dataset.key);
    document.getElementById('mobile-menu').style.display='none';
  });
});

// --- HAMBURGER ---
document.getElementById('hamburger').onclick = () =>
  document.getElementById('mobile-menu').style.display='flex';

document.querySelector('#mobile-menu .close-btn').onclick = () =>
  document.getElementById('mobile-menu').style.display='none';

overlay.querySelector('.close-btn').onclick = resetZoom;

// --- GIROSCOPIO MOBILE ---
if('ontouchstart' in window){

  const gyroOverlay = document.createElement('div');
  gyroOverlay.id = 'gyroOverlay';
  document.body.appendChild(gyroOverlay);

  const gyroBtn = document.createElement('button');
  gyroBtn.id = 'gyroBtn';
  gyroBtn.innerText = 'Attiva Giroscopio';
  document.body.appendChild(gyroBtn);

  setTimeout(()=>gyroOverlay.classList.add('active'), 10);

  setTimeout(()=>{
    gyroBtn.classList.add('hidden');
    gyroOverlay.classList.remove('active');
  }, 10000);

  gyroBtn.addEventListener('click', ()=>{
    gyroBtn.classList.add('hidden');
    gyroOverlay.classList.remove('active');

    window.addEventListener('deviceorientation', e => {
      if(isZoomed) return;

      mouseX += ((e.gamma||0)/30 - mouseX)*0.1;
      mouseY += ((e.beta||0)/30 - mouseY)*0.1;

      mouseX = Math.max(-1, Math.min(1, mouseX));
      mouseY = Math.max(-1, Math.min(1, mouseY));

      updateParallax(mouseX, mouseY);
    });
  });
}

// --- ELEMENTO HERO ---
const hero = document.getElementById('hero');

// --- FILTRI TEMPO ---
const filters = {
  giorno: 'brightness(1.2) saturate(0.35) hue-rotate(-5deg)',
  sera: 'brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2)',
  chiuso: 'brightness(0.2) saturate(0.5)'
};

// --- CONTROLLO TEMPO MANUALE ---
function setTimeManually(state) {
  // Aggiorna attributo data-time
  document.body.setAttribute('data-time', state);

  // Forza il browser a leggere il filtro corrente
  void hero.offsetWidth;

  // Applica il nuovo filtro con requestAnimationFrame per transizione affidabile
  requestAnimationFrame(() => {
    hero.style.filter = filters[state];
  });
}

// --- CONTROLLO TEMPO AUTOMATICO ---
function applyTimeFilter() {
  const hour = new Date().getHours();
  let state = 'giorno';

  if(hour >= 9 && hour < 18) state = 'giorno';
  else if(hour >= 18 || hour < 2) state = 'sera';
  else state = 'chiuso';

  setTimeManually(state);
}

// --- CREAZIONE PULSANTI ---
const controls = document.createElement('div');
controls.id = 'timeControls';
controls.innerHTML = `
  <button data-time="giorno">Giorno</button>
  <button data-time="sera">Sera</button>
  <button data-time="chiuso">Chiuso</button>
`;
document.body.appendChild(controls);

controls.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', () => setTimeManually(btn.dataset.time));
});

// --- INIT ---
applyTimeFilter();
setLayers();
window.addEventListener('resize', setLayers);
</script>
</body>
