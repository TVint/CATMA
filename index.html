<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catma Bar</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:sans-serif;user-select:none;cursor:none;}
#loader{position:fixed;top:0;left:0;width:100vw;height:100vh;background:#b22222;display:flex;justify-content:center;align-items:center;z-index:999999;overflow:hidden;transition:transform 0.8s ease;}
#loader img{width:150px;animation:rotateLogo 1s linear infinite;}
@keyframes rotateLogo{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
#loader.hidden{transform:translateY(-100%);pointer-events:none;}
#custom-cursor{position:fixed;top:0;left:0;width:25px;height:25px;background:black;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);z-index:99999;transition:transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;box-shadow:0 0 10px 3px rgba(178,34,34,0.6);}
#hero{width:100%;height:100vh;position:relative;overflow:hidden;}
#hero-text{position:absolute;width:100%;top:150px;left:50%;transform:translateX(-50%);text-align:center;color:#fff;z-index:90;pointer-events:none;text-shadow:1px 1px 5px #000;}
#hero-text .subtitle{font-size:1.5vw;margin-top:25px;opacity:.8;}
#hero-text .title{font-size:3vw;margin:5px 0;font-weight:bold;animation:glowBreath 3s ease-in-out infinite;}
#hero-text .title-big{font-size:6vw;margin:0;font-weight:bold;animation:glowBreath 3s ease-in-out infinite;}
@keyframes glowBreath{0%,100%{text-shadow:0 0 4px rgba(255,255,255,.7),0 0 10px rgba(178,34,34,.5);}50%{text-shadow:0 0 8px rgba(255,255,255,1),0 0 20px rgba(178,34,34,.8);}}
.layer{position:absolute;width:120%;height:120%;top:-10%;left:-10%;object-fit:cover;pointer-events:none;transition:transform .5s ease;}.layer.overlay-active{opacity:.8;transform:scale(1.05);}
.hotspot{position:absolute;width:50px;height:50px;border-radius:50%;background:#b22222;box-shadow:0 0 20px rgba(178,34,34,.9);transform:translate(-50%,-50%);animation:pulse 2s infinite;cursor:pointer;z-index:50;}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.2);}}
.hotspot-label{position:absolute;pointer-events:none;background:rgba(0,0,0,.7);color:#fff;padding:4px 10px;border-radius:4px;font-size:14px;font-weight:500;white-space:nowrap;opacity:0;transform:translate(-50%,-10px);transition:opacity .2s ease,transform .2s ease;z-index:100;}
.hotspot:hover .hotspot-label{opacity:1;transform:translate(-50%,-30px);}
.cta-group{display:flex;gap:15px;justify-content:center;margin-top:20px;}
.cta-btn{border:2.5px solid #fff;height:auto;text-align:center;width:200px;box-sizing:border-box;padding:10px;border-radius:50px;text-decoration:none;font-weight:600;background:rgba(178,34,34,.9);color:#fff;box-shadow:0 0 15px rgba(178,34,34,.6);transition:all .25s ease;}
.cta-btn:hover{transform:scale(1.1);box-shadow:0 0 25px rgba(178,34,34,.9);}
.cta-btn.secondary{background:transparent;border:1px solid rgba(255,255,255,.4);}
#menu{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:90%;display:flex;align-items:center;z-index:100;}
#menu a{flex:1;text-align:center;color:#fff;text-decoration:none;}
.logo-center{flex:1;display:flex;justify-content:center;}
.logo-center img{height:60px;}
#mobile-logo{display:none;position:absolute;top:20px;left:20px;height:40px;z-index:101;}
#hamburger{display:none;position:absolute;top:20px;right:20px;width:30px;height:25px;flex-direction:column;justify-content:space-between;cursor:pointer;z-index:101;}
#hamburger div{height:4px;background:#fff;}
#mobile-menu{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,.9);justify-content:center;align-items:center;flex-direction:column;z-index:800;}
#mobile-menu a{color:#fff;margin:15px 0;font-size:1.5rem;text-decoration:none;text-transform:uppercase;}
#mobile-menu .cta{border:2px solid #fff;padding:12px 25px;border-radius:30px;margin-top:20px;}
#mobile-menu img{height:60px;margin-bottom:20px;}
.close-btn{position:absolute;top:100px;font-size:4rem;color:#fff;cursor:pointer;pointer-events:auto;z-index:99999;}
#content-overlay{position:fixed;width:100%;height:100%;background:rgba(0,0,0,.8);justify-content:center;align-items:center;z-index:700;backdrop-filter:blur(5px);display:flex;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease;}
#content-overlay.active{opacity:1;visibility:visible;}
.content-box{color:#fff;text-align:center;transform:scale(0);transition:transform .4s ease;}
.hotspot.hidden{opacity:0;pointer-events:none;}
#gyroBtn{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);width:250px;height:50px;background:#b22222;color:#fff;border:none;border-radius:150px;z-index:99999;font-size:1.5rem;cursor:pointer;box-shadow:0 0 15px rgba(255,255,255,.5);animation:pulseBtn 1.5s ease-in-out infinite;transition:transform .2s ease,box-shadow .2s ease;}
#gyroBtn:hover{transform:translate(-50%,-50%) scale(1.05);box-shadow:0 0 25px rgba(255,255,255,.6);}
#gyroBtn.hidden{opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.8);}
@keyframes pulseBtn{0%,100%{transform:translate(-50%,-50%) scale(1);box-shadow:0 0 15px rgba(255,255,255,.5);}50%{transform:translate(-50%,-50%) scale(1.08);box-shadow:0 0 25px rgba(255,255,255,.6);}}
#gyroOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.7);z-index:99998;pointer-events:none;opacity:0;transition:opacity .3s ease;}
#gyroOverlay.active{opacity:1;}
body[data-time="giorno"] #hero{filter:brightness(1.2) saturate(.35) hue-rotate(-5deg);}
body[data-time="sera"] #hero{filter:brightness(.95) contrast(1.1) sepia(.3) saturate(1.2);}
body[data-time="chiuso"] #hero{filter:brightness(.2) saturate(.5);}
#timeControls{position:fixed;top:120px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:650;}
#timeControls button{padding:5px 10px;border:none;border-radius:150px;background:#b22222;color:white;cursor:pointer;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,.3);transition:background .3s ease;}
#timeControls button:hover{background:#ff4d4d;}
.footer-social{display:inline-flex;align-items:center;gap:10px;}
.footer-social a{display:inline-block;}
.footer-social img{width:20px;height:20px;object-fit:contain;vertical-align:middle;}
@media(max-width:768px){#menu{display:none}#hamburger{display:flex}#mobile-logo{display:block}.hotspot{width:40px;height:40px}#hero-text{top:35%}#hero-text .title-big{font-size:12vw}#hero-text .title{font-size:6vw}#hero-text .subtitle{font-size:3vw}}
@media(min-width:769px){.mobile-layer{display:none}}
@media(pointer:coarse),(max-width:768px){#custom-cursor{display:none!important}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="CATMA Logo"></div>

<!-- MENU DESKTOP -->
<div id="menu">
<a href="#" data-key="chi">CHI SIAMO</a>
<a href="#" data-key="mescita">MESCITA</a>
<div class="logo-center"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png"></div>
<a href="#" data-key="bar">BAR</a>
<a href="#" data-key="eventi">EVENTI</a>
</div>

<!-- MOBILE LOGO + HAMBURGER -->
<img id="mobile-logo" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png">
<div id="hamburger"><div></div><div></div><div></div></div>

<!-- MOBILE MENU -->
<div id="mobile-menu">
<div class="close-btn">&times;</div>
<a href="#" data-key="chi">CHI SIAMO</a>
<a href="#" data-key="mescita">MESCITA</a>
<a href="#" data-key="bar">BAR</a>
<a href="#" data-key="eventi">EVENTI</a>
<a href="#" class="cta" data-key="prenota">PRENOTA</a>
</div>

<!-- HERO TEXT -->
<div id="hero-text">
<h2 class="title">BENVENUTI AL</h2>
<h1 class="title-big">CATMA BAR</h1>
<p class="subtitle">Via delle Sirene, 13 - Lido di Jesolo (VE)</p>
</div>

<!-- CONTENT OVERLAY -->
<div id="content-overlay"><div class="close-btn">&times;</div><div class="content-box"></div></div>

<!-- HERO LAYERS -->
<div id="hero">
<img class="layer desktop-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp">
<img class="layer desktop-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp">
<img class="layer desktop-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp">
<img class="layer mobile-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774791189/Catma-background-mobile_oqmkn0.webp">
<img class="layer mobile-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792265/Catma-midground-mobile_xvwur8.webp">
<img class="layer mobile-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802973/Catma-foreground-mobile_wpnzl9.webp">
</div>

<!-- HOTSPOTS -->
<div class="hotspot" data-key="chi" data-x-desktop="10" data-y-desktop="40" data-x-mobile="5" data-y-mobile="45"></div>
<div class="hotspot" data-key="mescita" data-x-desktop="27" data-y-desktop="68" data-x-mobile="5" data-y-mobile="60"></div>
<div class="hotspot cta-btn" data-key="prenota" data-x-desktop="50" data-y-desktop="55" data-x-mobile="50" data-y-mobile="50">PRENOTA</div>
<div class="hotspot" data-key="eventi" data-x-desktop="85" data-y-desktop="45" data-x-mobile="95" data-y-mobile="50"></div>
<div class="hotspot" data-key="bar" data-x-desktop="85" data-y-desktop="65" data-x-mobile="90" data-y-mobile="65"></div>

<!-- FOOTER -->
<footer style="background:#b22222;color:#fff;width:100vw;position:fixed;bottom:0;left:0;z-index:500;box-sizing:border-box;">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;">
<div style="padding:10px;width:100%;text-align:center;font-size:10px;">Via delle Sirene 13, Lido di Jesolo (VE) | P.IVA: 01234567890</div>
</div>
<div style="text-align:center;margin-top:8px;font-size:10px;padding:10px;background-color:#000">&copy; <span id="year"></span> Catma Bar. Tutti i diritti riservati.
<div class="footer-social" style="padding:10px;">
<a href="https://www.instagram.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-01_n8pedz.png" alt="Instagram"></a>
<a href="https://www.facebook.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-02_qpgtp7.png" alt="Facebook"></a>
</div>
</div>
</footer>

<script>
// --- VARIABILI PRINCIPALI ---
document.getElementById('year').innerText = new Date().getFullYear();
const hero=document.getElementById('hero'),hotspots=document.querySelectorAll('.hotspot'),overlay=document.getElementById('content-overlay'),contentBox=overlay.querySelector('.content-box'),title=document.getElementById('title');let layers={},mouseX=0,mouseY=0,isZoomed=false;
const map={chi:{label:'CHI SIAMO',key:'chi'},mescita:{label:'MESCITA',key:'mescita'},prenota:{label:'PRENOTA',key:'prenota'},eventi:{label:'EVENTI',key:'eventi'},bar:{label:'BAR',key:'bar'}};
const contentMap={
chi:`<div class="content-inner"><h1>Chi siamo</h1><p>CATMA BAR è un punto di riferimento al Lido di Jesolo, tra ricerca musicale e cultura del bere.</p></div>`,
mescita:`<div class="content-inner"><h1>Mescita</h1><p>Selezione di vini naturali, birre artigianali e cocktail essenziali.</p></div>`,
eventi:`<div class="content-inner"><h1>Eventi</h1><p>Dj set, live e serate speciali ogni settimana.</p></div>`,
bar:`<div class="content-inner"><h1>Il Bar</h1><p>Uno spazio intimo tra luce e ombra, progettato per vivere la notte.</p></div>`,
prenota:`<div class="content-inner"><h1>Prenota un tavolo</h1><p>Scrivici su WhatsApp oppure chiamaci direttamente.</p><div class="cta-group"><a href="https://wa.me/393XXXXXXXXX?text=Ciao, vorrei prenotare un tavolo al CATMA BAR" target="_blank" class="cta-btn">WhatsApp</a><a href="tel:+393XXXXXXXXX" class="cta-btn secondary">Chiama</a></div></div>`
};

// --- INIT LAYERS ---
function setLayers(){
const isMobile='ontouchstart' in window;
layers=isMobile?{background:hero.querySelector('.mobile-layer.background'),midground:hero.querySelector('.mobile-layer.midground'),foreground:hero.querySelector('.mobile-layer.foreground')}:{background:hero.querySelector('.desktop-layer.background'),midground:hero.querySelector('.desktop-layer.midground'),foreground:hero.querySelector('.desktop-layer.foreground')};
updateHotspots();
}

// --- HOTSPOTS ---
function updateHotspots(){
const isMobile='ontouchstart' in window;
hotspots.forEach(h=>{const ox=isMobile?h.dataset.xMobile/100*hero.clientWidth:h.dataset.xDesktop/100*hero.clientWidth,oy=isMobile?h.dataset.yMobile/100*hero.clientHeight:h.dataset.yDesktop/100*hero.clientHeight;h.dataset.ox=ox;h.dataset.oy=oy;});
updateParallax(mouseX,mouseY);
}

// --- PARALLAX ---
function updateParallax(x,y){
const maxOffset={background:{x:40,y:20},midground:{x:60,y:40},foreground:{x:100,y:80}};
if(!layers.background) return;
layers.background.style.transform=`translate(${x/maxOffset.background.x}px,${y/maxOffset.background.y}px)`;
layers.midground.style.transform=`translate(${x/maxOffset.midground.x}px,${y/maxOffset.midground.y}px)`;
layers.foreground.style.transform=`translate(${x/maxOffset.foreground.x}px,${y/maxOffset.foreground.y}px)`;
hotspots.forEach(h=>{h.style.left=`${h.dataset.ox}px`;h.style.top=`${h.dataset.oy}px`;});
}

// --- MOUSE MOVE ---
document.addEventListener('mousemove',e=>{mouseX=(e.clientX-window.innerWidth/2)/30;mouseY=(e.clientY-window.innerHeight/2)/30;updateParallax(mouseX,mouseY);document.getElementById('custom-cursor').style.transform=`translate(${e.clientX}px,${e.clientY}px)`;});

// --- HOTSPOT CLICK ---
hotspots.forEach(h=>{h.addEventListener('click',()=>{const key=h.dataset.key;contentBox.innerHTML=contentMap[key];overlay.classList.add('active');});});
overlay.querySelector('.close-btn').addEventListener('click',()=>{overlay.classList.remove('active');});

// --- LOADER ---
window.addEventListener('load',()=>{setLayers();setTimeout(()=>{document.getElementById('loader').classList.add('hidden');},1200);});

// --- MOBILE MENU ---
const hamburger=document.getElementById('hamburger'),mobileMenu=document.getElementById('mobile-menu'),closeBtn=mobileMenu.querySelector('.close-btn');
hamburger.addEventListener('click',()=>{mobileMenu.style.display='flex';});
closeBtn.addEventListener('click',()=>{mobileMenu.style.display='none';});

// --- TIME CONTROLS ---
function setTimeState(){const h=new Date().getHours();let state=h>=7&&h<18?'giorno':h>=18&&h<23?'sera':'chiuso';document.body.dataset.time=state;}
setTimeState();
setInterval(setTimeState,60000);

// --- CUSTOM CURSOR ---
const cursor=document.createElement('div');cursor.id='custom-cursor';document.body.appendChild(cursor);
</script>
<div id="custom-cursor"></div>
</body>
</html>
