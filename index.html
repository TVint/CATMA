    };

    const iconsMap = {
      chi: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
      mescita: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8M12 15v7M7 3h10v3a5 5 0 0 1-5 5v0a5 5 0 0 1-5-5V3z"/></svg>`,
      bar: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 11h1a3 3 0 0 1 0 6h-1M9 12v6M13 12v6M14 7.5c-1 0-1.44.5-3 .5s-2-.5-3-.5-1.72.5-2.5.5a2.5 2.5 0 0 1 5 0c.81 0 1.5-.5 2.5-.5a2.5 2.5 0 0 1 5 0c.81 0 1.5-.5 2.5-.5zM5 8v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V8"/></svg>`,
      eventi: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
    };

    const heroLayers = document.getElementById('hero-layers');
    const heroText = document.getElementById('hero-text');
    const heroTrail = document.getElementById('hero-text-trail');
    const hotspots = document.querySelectorAll('.hotspot');
    const bgAudio = document.getElementById('bg-audio');
    const loader = document.getElementById('loader');

    let targetX = 0, targetY = 0, currentX = 0, currentY = 0, trailX = 0, trailY = 0, rafId = null;
    let isZoomed = false, soundEnabled = false, manualTime = false;
    const isTouch = 'ontouchstart' in window;

    function renderParallax() {
      if (isZoomed) return;
      const x = currentX, y = currentY;
      const tx = trailX, ty = trailY;
      const isMobile = window.innerWidth <= 768;

      // Layers Background
      const layers = isMobile ? document.querySelectorAll('.mobile-layer') : document.querySelectorAll('.desktop-layer');
      if (layers[0]) layers[0].style.transform = `translate3d(${x*15}px, ${y*8}px, 0)`;
      if (layers[1]) layers[1].style.transform = `translate3d(${x*25}px, ${y*12}px, 0)`;
      if (layers[2]) layers[2].style.transform = `translate3d(${x*40}px, ${y*20}px, 0)`;

      // Text Movement - SOLO DESKTOP per stabilità footer
      if (!isTouch) {
        heroText.style.transform = `translate(-50%, -50%) translate3d(${-x*100}px, ${-y*80}px, 0)`;
        heroTrail.style.transform = `translate(-50%, -50%) translate3d(${-tx*100}px, ${-ty*80}px, 0)`;
      }

      hotspots.forEach(h => {
        if(!h.classList.contains('hidden')) {
          const ox = parseFloat(h.dataset.ox), oy = parseFloat(h.dataset.oy);
          h.style.left = `${ox + (x*25)}px`; h.style.top = `${oy + (y*12)}px`;
        }
      });
      rafId = requestAnimationFrame(updateLoop);
    }

    function updateLoop() {
      currentX += (targetX - currentX) * 0.15;
      currentY += (targetY - currentY) * 0.15;
      trailX += (targetX - trailX) * 0.10;
      trailY += (targetY - trailY) * 0.10;
      renderParallax();
    }

    document.addEventListener('mousemove', e => {
      if(isTouch) return;
      targetX = (e.clientX / window.innerWidth) - 0.5;
      targetY = (e.clientY / window.innerHeight) - 0.5;
    });

    function updateUI() {
      document.querySelectorAll('.i18n-menu').forEach(el => el.innerText = i18n[currentLang].menu[el.dataset.i18n]);
      document.getElementById('mobile-menu').innerHTML = `
        <a href="#" data-key="chi">${iconsMap.chi} ${i18n[currentLang].menu.chi}</a>
        <a href="#" data-key="mescita">${iconsMap.mescita} ${i18n[currentLang].menu.mescita}</a>
        <a href="#" data-key="bar">${iconsMap.bar} ${i18n[currentLang].menu.bar}</a>
        <a href="#" data-key="eventi">${iconsMap.eventi} ${i18n[currentLang].menu.eventi}</a>
        <a href="#" class="cta" data-key="prenota">${i18n[currentLang].menu.prenota}</a>
      `;
      document.querySelector('.i18n-cta').innerText = i18n[currentLang].menu.prenota;
      document.getElementById('trail-cta').innerText = i18n[currentLang].menu.prenota;
      applyTimeFilter();
      bindEvents();
    }

    function setTimeVisuals(state) {
      document.body.setAttribute('data-time', state);
      const t = i18n[currentLang].hero[state] || i18n['it'].hero[state];
      document.getElementById('text-title').innerHTML = t.t;
      document.getElementById('trail-title').innerHTML = t.t;
      document.getElementById('text-subtitle').innerHTML = t.sub;
      document.getElementById('trail-subtitle').innerHTML = t.sub;

      const tracks = { 
        giorno: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Bossa%20Antigua.mp3",
        sera: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Faster%20Does%20It.mp3",
        chiuso: "https://res.cloudinary.com/dkni7ncod/video/upload/v1774988445/seaguls_lsc1ou.mp3"
      };
      if(bgAudio.src !== tracks[state]) { bgAudio.src = tracks[state]; bgAudio.load(); if(soundEnabled) bgAudio.play(); }
    }

    function applyTimeFilter() { if(!manualTime) { const h = new Date().getHours(); setTimeVisuals((h>=9&&h<18)?'giorno':(h>=18||h<2)?'sera':'chiuso'); } }

    function bindEvents() {
      document.querySelectorAll('[data-key]').forEach(el => {
        el.onclick = e => { e.preventDefault(); if(el.dataset.key) zoomTo(el.dataset.key); document.getElementById('mobile-menu').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); };
      });
    }

    function zoomTo(key) {
      if(isZoomed) return;
      isZoomed = true;
      document.getElementById('content-overlay').classList.add('active');
      const t = i18n[currentLang].popups[key] || i18n['it'].popups[key];
      document.querySelector('.content-box').innerHTML = `<h1>${t.title}</h1><p>${t.desc}</p>`;
      setTimeout(() => document.querySelector('.content-box').classList.add('show'), 100);
    }

    document.getElementById('hamburger').onclick = () => {
      document.getElementById('mobile-menu').classList.toggle('open');
      document.getElementById('hamburger').classList.toggle('open');
    };

    document.querySelectorAll('#lang-selector button').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#lang-selector button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        updateUI();
      };
    });

    document.getElementById('audio-toggle').onclick = () => {
      soundEnabled = !soundEnabled;
      document.getElementById('audio-toggle').classList.toggle('playing');
      soundEnabled ? bgAudio.play() : bgAudio.pause();
    };

    window.onload = () => {
      setTimeout(() => {
        loader.classList.add('hidden');
        document.body.classList.add('app-loaded');
        setLayers();
        updateLoop();
      }, 1500);
    };

    function setLayers() {
      const isMobile = window.innerWidth <= 768;
      hotspots.forEach(h => {
        h.dataset.ox = (parseFloat(isMobile ? h.dataset.xMobile : h.dataset.xDesktop)/100) * window.innerWidth;
        h.dataset.oy = (parseFloat(isMobile ? h.dataset.yMobile : h.dataset.yDesktop)/100) * window.innerHeight;
      });
    }

    document.querySelector('.close-btn').onclick = () => {
      document.getElementById('content-overlay').classList.remove('active');
      isZoomed = false;
    };

    updateUI();
  </script>
</body>
</html>
