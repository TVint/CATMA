<!DOCTYPE html>
<html lang="it" id="html-doc">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Catma Bar | Hi-Fi Bar & Live Music a Jesolo Lido</title>
  <meta name="description" content="Catma Bar in Piazza Marconi a Jesolo Lido. Hi-Fi Bar, vini naturali, cucina di alto livello, live music e dj-set di nicchia. L'oste Giovanni ti aspetta.">
  
  <link rel="icon" href="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" type="image/png">

  <style>
    :root {
      --main-color: #b22222; 
      --shadow-color: rgba(178,34,34,0.6);
      --shadow-strong: rgba(178,34,34,0.9);
    }
    body[data-time="giorno"] { --main-color: #d83a3a; --shadow-color: rgba(216,58,58,0.6); --shadow-strong: rgba(216,58,58,0.9); }
    body[data-time="sera"] { --main-color: #b22222; --shadow-color: rgba(178,34,34,0.6); --shadow-strong: rgba(178,34,34,0.9); }
    body[data-time="chiuso"] { --main-color: #7a1515; --shadow-color: rgba(122,21,21,0.6); --shadow-strong: rgba(122,21,21,0.9); }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; height: 100%; width: 100%; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; }
    body, body * { -webkit-user-select: none; user-select: none; cursor: none !important; }

    /* ATMOSFERA */
    #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 85; background: radial-gradient(circle at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.85) 100%); }
    #film-noise { position: absolute; inset: 0; pointer-events: none; z-index: 86; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
    #hero-layers { transition: filter 1s ease; will-change: filter; }
    body[data-time="giorno"] #hero-layers { filter: brightness(1.1) contrast(1.05) saturate(0.35); }
    body[data-time="sera"] #hero-layers { filter: brightness(0.85) contrast(1.2) sepia(0.3) saturate(1.3) hue-rotate(-10deg); }
    body[data-time="chiuso"] #hero-layers { filter: brightness(0.4) contrast(1.2) saturate(0.4) sepia(0.5) hue-rotate(180deg); }

    /* LOADER & CURSOR */
    #loader { position: fixed; inset: 0; background: var(--main-color); display: flex; justify-content: center; align-items: center; z-index: 999999; clip-path: circle(150% at 50% 50%); transition: clip-path 1.2s cubic-bezier(0.77, 0, 0.175, 1); }
    #loader.hidden { clip-path: circle(0% at 50% 50%); pointer-events: none; }
    #loader img { width: 150px; animation: rotateLogo 1.5s linear infinite; }
    @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    #custom-cursor { position: fixed; width: 25px; height: 25px; background: black; border-radius: 50%; pointer-events: none; z-index: 99999; box-shadow: 0 0 10px 3px var(--shadow-color); transition: transform 0.1s ease; }

    /* LANG SELECTOR */
    #lang-selector { position: absolute; top: 40px; right: 40px; z-index: 802; display: flex; gap: 10px; }
    #lang-selector button { background: none; border: none; color: rgba(255,255,255,0.5); font-weight: bold; font-size: 14px; cursor: pointer; transition: color 0.3s; pointer-events: auto; }
    #lang-selector button.active { color: var(--main-color); }

    /* MENU & LOGO */
    #menu { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 80%; display: flex; align-items: center; z-index: 100; }
    #menu a { flex: 1; text-align: center; color: #fff; text-decoration: none; font-weight: bold; letter-spacing: 1px; transition: color 0.3s; pointer-events: auto; }
    #menu a:hover { color: var(--main-color); }
    .logo-center { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; height: 60px; cursor: pointer; pointer-events: auto; }
    .logo-center img { position: absolute; height: 100%; transition: opacity 0.3s ease, transform 0.3s ease; }
    .logo-red { opacity: 0; filter: brightness(0) saturate(100%) invert(16%) sepia(91%) saturate(3200%) hue-rotate(345deg) brightness(80%) contrast(95%); }
    .logo-center:hover .logo-white { opacity: 0; transform: scale(1.08); }
    .logo-center:hover .logo-red { opacity: 1; transform: scale(1.08); }

    /* HERO TEXT & TRAIL */
    #hero-text, #hero-text-trail { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    #hero-text-trail { color: var(--main-color); z-index: 89; filter: blur(12px); opacity: 0; mix-blend-mode: screen; }
    #hero-text { color: #fff; z-index: 90; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
    
    #hero-text .title, #hero-text .title-big, #hero-text .subtitle, .hero-cta { opacity: 0; transform: translateY(20px); }
    #hero-text .title, #hero-text-trail .title { font-size: 3vw; margin: 0; font-weight: 300; letter-spacing: 4px; }
    #hero-text .title-big, #hero-text-trail .title-big { font-size: 7vw; margin: 0; font-weight: bold; letter-spacing: 8px; }
    #hero-text .subtitle { font-size: 1.2vw; margin-top: 15px; font-weight: 300; }

    body.app-loaded #hero-text .title { animation: cinFade 1.5s ease forwards; }
    body.app-loaded #hero-text .title-big { animation: cinFade 2s ease 0.2s forwards; }
    body.app-loaded #hero-text .subtitle { animation: cinUp 1s ease 0.6s forwards; }
    body.app-loaded .hero-cta { animation: cinUp 1s ease 1s forwards; pointer-events: auto; }
    body.app-loaded #hero-text-trail { animation: cinTrail 3s ease 0.5s forwards; }

    @keyframes cinFade { 0% { opacity: 0; filter: blur(10px); transform: scale(0.9) translateY(20px); } 100% { opacity: 1; filter: blur(0px); transform: scale(1) translateY(0); } }
    @keyframes cinUp { to { opacity: 0.8; transform: translateY(0); } }
    @keyframes cinTrail { to { opacity: 0.6; } }

    .hero-cta { margin-top: 40px; padding: 16px 45px; border-radius: 40px; text-decoration: none; color: #fff; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); transition: all 0.4s ease; backdrop-filter: blur(10px); }
    .hero-cta:hover { background: var(--main-color); transform: scale(1.05); }

    /* HOTSPOTS */
    .hotspot { position: absolute; width: 45px; height: 45px; border-radius: 50%; background: var(--main-color); display: flex; justify-content: center; align-items: center; z-index: 50; color: #fff; pointer-events: auto; }
    .hotspot.hidden { opacity: 0; pointer-events: none; }
    .hotspot-label { position: absolute; background: var(--main-color); padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; top: -40px; opacity: 0; transition: 0.3s; white-space: nowrap; }
    .hotspot:hover .hotspot-label { opacity: 1; }

    /* MOBILE SETTINGS */
    @media (max-width: 768px) {
      #menu { display: none; }
      #hamburger { display: flex; position: absolute; top: 15px; right: 15px; z-index: 801; width: 30px; height: 25px; flex-direction: column; justify-content: space-between; pointer-events: auto; }
      #hamburger div { height: 3px; width: 100%; background: #fff; transition: 0.3s; }
      #mobile-logo { display: block; position: absolute; top: 15px; left: 15px; height: 45px; z-index: 101; }
      #lang-selector { top: 20px; right: auto; left: 50%; transform: translateX(-50%); width: fit-content; }
      #hero-text .title, #hero-text-trail .title { font-size: 6vw; }
      #hero-text .title-big, #hero-text-trail .title-big { font-size: 12vw; }
      #hero-text .subtitle { font-size: 4vw; width: 85%; }
      #mobile-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 800; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: circle(0% at 100% 0%); transition: 0.6s ease-in-out; }
      #mobile-menu.open { clip-path: circle(150% at 100% 0%); }
      #mobile-menu a { color: #fff; font-size: 1.5rem; text-decoration: none; margin: 15px; text-transform: uppercase; font-weight: bold; }
    }

    /* POPUP & CLOSE BTN */
    #content-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s; backdrop-filter: blur(10px); }
    #content-overlay.active { opacity: 1; visibility: visible; }
    .content-box { color: #fff; text-align: center; max-width: 500px; padding: 20px; }
    .close-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 40px; color: #fff; pointer-events: auto; transition: 0.3s; }
    .close-btn:hover { color: var(--main-color); transform: translateX(-50%) scale(1.2); }

    /* FOOTER */
    footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #111; z-index: 500; font-size: 11px; color: #888; }
    .footer-top { background: var(--main-color); color: #fff; padding: 8px; text-align: center; font-weight: bold; }
    .footer-bottom { background: #000; padding: 8px; text-align: center; }

    #audio-toggle { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 600; background: #000; color: #fff; padding: 10px 20px; border-radius: 30px; border: 1px solid #444; pointer-events: auto; }
  </style>
</head>
<body data-time="sera">

  <div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="Logo"></div>
  <div id="gyro-overlay" class="active" style="position:fixed; inset:0; z-index:99999; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.8);"><button id="gyro-btn" style="padding:20px 40px; border-radius:40px; background:var(--main-color); color:#fff; border:none; font-weight:bold;">ATTIVA ESPERIENZA 3D</button></div>

  <div id="lang-selector">
    <button class="active" data-lang="it">IT</button>
    <button data-lang="en">EN</button>
    <button data-lang="de">DE</button>
  </div>

  <div id="menu">
    <a href="#" data-key="chi">CHI SIAMO</a>
    <a href="#" data-key="mescita">MESCITA</a>
    <div class="logo-center">
      <img class="logo-white" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="Logo">
      <img class="logo-red" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="Logo">
    </div>
    <a href="#" data-key="bar">HI-FI BAR</a>
    <a href="#" data-key="eventi">EVENTI</a>
  </div>

  <img id="mobile-logo" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="Logo">
  <div id="hamburger"><div></div><div></div><div></div></div>
  <div id="mobile-menu"></div>

  <div id="hero">
    <div id="hero-layers">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp" style="z-index:1">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp" style="z-index:2">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp" style="z-index:3">
      <img class="layer mobile-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774791189/Catma-background-mobile_oqmkn0.webp" style="z-index:1">
      <img class="layer mobile-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774917597/Catma-midground-mobile_xvwur8.webp" style="z-index:2">
      <img class="layer mobile-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802973/Catma-foreground-mobile_wpnzl9.webp" style="z-index:3">
    </div>

    <div class="hotspot" data-key="chi" data-x-desktop="10" data-y-desktop="40" data-x-mobile="15" data-y-mobile="35"></div>
    <div class="hotspot" data-key="mescita" data-x-desktop="30" data-y-desktop="60" data-x-mobile="25" data-y-mobile="70"></div>
    <div class="hotspot" data-key="eventi" data-x-desktop="75" data-y-desktop="35" data-x-mobile="75" data-y-mobile="40"></div>
    <div class="hotspot" data-key="bar" data-x-desktop="85" data-y-desktop="65" data-x-mobile="80" data-y-mobile="75"></div>
  </div>

  <div id="hero-text-trail"><h2 class="title"></h2><h1 class="title-big">CATMA BAR</h1><p class="subtitle" style="visibility:hidden"></p><a href="#" class="hero-cta" style="visibility:hidden">PRENOTA</a></div>
  <div id="hero-text"><h2 class="title"></h2><h1 class="title-big">CATMA BAR</h1><p class="subtitle"></p><a href="#" class="hero-cta" data-key="prenota">PRENOTA UN TAVOLO</a></div>

  <div id="audio-toggle">AUDIO OFF</div>
  <audio id="bg-audio" loop></audio>

  <div id="content-overlay"><div class="close-btn">&times;</div><div class="content-box"></div></div>

  <footer>
    <div class="footer-top">Via delle Sirene 13, Lido di Jesolo</div>
    <div class="footer-bottom">&copy; 2026 Catma Bar.</div>
  </footer>

  <script>
    const i18n = {
      it: {
        menu: { chi: "CHI SIAMO", mescita: "MESCITA", bar: "HI-FI BAR", eventi: "LIVE MUSIC", prenota: "PRENOTA UN TAVOLO" },
        hero: {
          giorno: { t: "BUONGIORNO DA", sub: "Cucina di alto livello e Vini Naturali a Jesolo Lido" },
          sera: { t: "BENVENUTI AL", sub: "L'Hi-Fi Bar di Piazza Marconi. Dj-set di nicchia e Live Music." },
          chiuso: { t: "IL CATMA È CHIUSO", sub: "Giovanni ti aspetta domani. Friendly vibes." }
        }
      },
      en: {
        menu: { chi: "ABOUT US", mescita: "MESCITA", bar: "HI-FI BAR", eventi: "LIVE MUSIC", prenota: "BOOK A TABLE" },
        hero: {
          giorno: { t: "GOOD MORNING", sub: "High-level cuisine and Natural Wines" },
          sera: { t: "WELCOME TO", sub: "Hi-Fi Bar at Piazza Marconi. Niche Dj-sets." },
          chiuso: { t: "CATMA IS CLOSED", sub: "Giovanni waits for you tomorrow." }
        }
      }
    };

    let currentLang = 'it';
    let targetX = 0, targetY = 0, curX = 0, curY = 0, trailX = 0, trailY = 0;
    const isMobile = window.innerWidth <= 768;

    function applyTime() {
      const h = new Date().getHours();
      const state = (h >= 9 && h < 18) ? 'giorno' : (h >= 18 || h < 2) ? 'sera' : 'chiuso';
      document.body.setAttribute('data-time', state);
      const content = i18n[currentLang].hero[state];
      document.querySelectorAll('#hero-text .title, #hero-text-trail .title').forEach(el => el.innerHTML = content.t);
      document.querySelectorAll('#hero-text .subtitle, #hero-text-trail .subtitle').forEach(el => el.innerHTML = content.sub);
      
      const audio = document.getElementById('bg-audio');
      const tracks = { giorno: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Bossa%20Antigua.mp3", sera: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Faster%20Does%20It.mp3", chiuso: "https://res.cloudinary.com/dkni7ncod/video/upload/v1774988445/seaguls_lsc1ou.mp3" };
      audio.src = tracks[state];
    }

    function loop() {
      curX += (targetX - curX) * 0.1;
      curY += (targetY - curY) * 0.1;
      trailX += (targetX - trailX) * 0.05;
      trailY += (targetY - trailY) * 0.05;

      const layers = isMobile ? document.querySelectorAll('.mobile-layer') : document.querySelectorAll('.desktop-layer');
      layers.forEach((l, i) => {
        const factor = (i + 1) * 20;
        l.style.transform = `translate3d(${curX * factor}px, ${curY * (factor/2)}px, 0) scale(1.1)`;
      });

      if(!isMobile) {
        document.getElementById('hero-text').style.transform = `translate(-50%, -50%) translate3d(${-curX * 80}px, ${-curY * 40}px, 0)`;
        document.getElementById('hero-text-trail').style.transform = `translate(-50%, -50%) translate3d(${-trailX * 80}px, ${-trailY * 40}px, 0)`;
      }

      document.querySelectorAll('.hotspot').forEach(h => {
        const ox = isMobile ? h.dataset.xMobile : h.dataset.xDesktop;
        const oy = isMobile ? h.dataset.yMobile : h.dataset.yDesktop;
        h.style.left = `calc(${ox}% + ${curX * 30}px)`;
        h.style.top = `calc(${oy}% + ${curY * 15}px)`;
      });

      requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', e => {
      targetX = (e.clientX / window.innerWidth) - 0.5;
      targetY = (e.clientY / window.innerHeight) - 0.5;
    });

    document.getElementById('gyro-btn').onclick = () => {
      document.getElementById('gyro-overlay').classList.remove('active');
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(res => {
          if (res === 'granted') window.addEventListener('deviceorientation', e => { targetX = e.gamma / 45; targetY = e.beta / 45; });
        });
      } else { window.addEventListener('deviceorientation', e => { targetX = e.gamma / 45; targetY = e.beta / 45; }); }
    };

    document.getElementById('hamburger').onclick = () => {
      document.getElementById('mobile-menu').classList.toggle('open');
      document.getElementById('mobile-menu').innerHTML = document.getElementById('menu').innerHTML;
      document.querySelectorAll('#mobile-menu a').forEach(a => a.onclick = () => document.getElementById('mobile-menu').classList.remove('open'));
    };

    document.querySelectorAll('[data-key]').forEach(el => {
      el.onclick = e => {
        e.preventDefault();
        const key = el.dataset.key;
        document.getElementById('content-overlay').classList.add('active');
        document.querySelector('.content-box').innerHTML = `<h1>${key.toUpperCase()}</h1><p>Contenuto in fase di caricamento per ${key}...</p>`;
      };
    });

    document.querySelector('.close-btn').onclick = () => document.getElementById('content-overlay').classList.remove('active');

    document.getElementById('audio-toggle').onclick = function() {
      const audio = document.getElementById('bg-audio');
      if(audio.paused) { audio.play(); this.innerHTML = "AUDIO ON"; }
      else { audio.pause(); this.innerHTML = "AUDIO OFF"; }
    };

    window.onload = () => {
      applyTime();
      loop();
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        document.body.classList.add('app-loaded');
      }, 1500);
    };
  </script>
</body>
</html>
