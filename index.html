<!DOCTYPE html>
<html lang="it" id="html-doc">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Catma Bar | Hi-Fi Bar & Live Music a Jesolo Lido</title>
  <link rel="icon" href="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" type="image/png">
  <style>
    :root { --main-color: #b22222; --shadow-color: rgba(178,34,34,0.6); --shadow-strong: rgba(178,34,34,0.9); }
    body[data-time="giorno"] { --main-color: #d83a3a; --shadow-color: rgba(216,58,58,0.6); --shadow-strong: rgba(216,58,58,0.9); }
    body[data-time="sera"] { --main-color: #b22222; --shadow-color: rgba(178,34,34,0.6); --shadow-strong: rgba(178,34,34,0.9); }
    body[data-time="chiuso"] { --main-color: #7a1515; --shadow-color: rgba(122,21,21,0.6); --shadow-strong: rgba(122,21,21,0.9); }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; position: fixed; width: 100%; }
    body, body * { -webkit-user-select: none; user-select: none; cursor: none !important; }

    /* ATMOSFERA E GRANA SOTTILE */
    #vignette { position: absolute; inset: 0; pointer-events: none; z-index: 85; background: radial-gradient(circle at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.85) 100%); }
    #film-noise { position: absolute; inset: 0; pointer-events: none; z-index: 86; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
    
    #hero-layers { transition: filter 1s ease; will-change: filter; }
    body[data-time="giorno"] #hero-layers { filter: brightness(1.1) contrast(1.05) saturate(0.35); }
    body[data-time="sera"] #hero-layers { filter: brightness(0.85) contrast(1.2) sepia(0.3) saturate(1.3) hue-rotate(-10deg); }
    body[data-time="chiuso"] #hero-layers { filter: brightness(0.4) contrast(1.2) saturate(0.4) sepia(0.5) hue-rotate(180deg); }

    /* LOADER */
    #loader { position: fixed; inset: 0; background: var(--main-color); display: flex; justify-content: center; align-items: center; z-index: 999999; clip-path: circle(150% at 50% 50%); transition: clip-path 1.2s cubic-bezier(0.77, 0, 0.175, 1); }
    #loader.hidden { clip-path: circle(0% at 50% 50%); pointer-events: none; }
    #loader img { width: 150px; animation: rotateLogo 1.5s linear infinite; }
    @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* CURSORE */
    #custom-cursor { position: fixed; width: 25px; height: 25px; background: black; border-radius: 50%; pointer-events: none; z-index: 99999; box-shadow: 0 0 10px 3px var(--shadow-color); transition: transform 0.1s ease; }

    /* MENU E LOGO (CROSSFADE NO-VIOLA) */
    #menu { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 80%; display: flex; align-items: center; z-index: 100; }
    #menu a { flex: 1; text-align: center; color: #fff; text-decoration: none; font-weight: bold; letter-spacing: 1px; transition: color 0.3s; pointer-events: auto; }
    .logo-center { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; height: 60px; cursor: pointer; pointer-events: auto; }
    .logo-center img { position: absolute; height: 100%; transition: opacity 0.3s ease, transform 0.3s ease; }
    .logo-red { opacity: 0; filter: brightness(0) saturate(100%) invert(16%) sepia(91%) saturate(3200%) hue-rotate(345deg) brightness(80%) contrast(95%); }
    .logo-center:hover .logo-white { opacity: 0; transform: scale(1.08); }
    .logo-center:hover .logo-red { opacity: 1; transform: scale(1.08); }

    /* TEXT HERO E ANIMAZIONE CINEMATIC (RIPRISTINATA) */
    #hero-text, #hero-text-trail { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    #hero-text-trail { color: var(--main-color); z-index: 89; filter: blur(12px); opacity: 0; mix-blend-mode: screen; }
    #hero-text { color: #fff; z-index: 90; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
    
    #hero-text .title, #hero-text .title-big, #hero-text .subtitle, .hero-cta { opacity: 0; transform: translateY(25px); }
    #hero-text .title, #hero-text-trail .title { font-size: 3vw; margin: 0; font-weight: 300; letter-spacing: 4px; }
    #hero-text .title-big, #hero-text-trail .title-big { font-size: 7vw; margin: 0; font-weight: bold; letter-spacing: 8px; }
    #hero-text .subtitle { font-size: 1.2vw; margin-top: 15px; font-weight: 300; }

    /* TRIGGER ANIMAZIONI */
    body.app-loaded #hero-text .title { animation: cinFade 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    body.app-loaded #hero-text .title-big { animation: cinFade 2.2s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; }
    body.app-loaded #hero-text .subtitle { animation: cinUp 1.2s ease 0.8s forwards; }
    body.app-loaded .hero-cta { animation: cinUp 1.2s ease 1.2s forwards; pointer-events: auto; }
    body.app-loaded #hero-text-trail { animation: cinTrail 3.5s ease 0.6s forwards; }

    @keyframes cinFade { 0% { opacity: 0; filter: blur(15px); transform: scale(0.8) translateY(30px); } 100% { opacity: 1; filter: blur(0px); transform: scale(1) translateY(0); } }
    @keyframes cinUp { to { opacity: 0.9; transform: translateY(0); } }
    @keyframes cinTrail { to { opacity: 0.6; } }

    .hero-cta { margin-top: 40px; padding: 16px 45px; border-radius: 40px; text-decoration: none; color: #fff; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); transition: all 0.4s ease; backdrop-filter: blur(10px); }
    .hero-cta:hover { background: var(--main-color); transform: scale(1.05); }

    /* CLOSE BUTTON CENTRATA */
    .close-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); font-size: 40px; color: #fff; pointer-events: auto; cursor: pointer; z-index: 9001; transition: 0.3s; }
    .close-btn:hover { color: var(--main-color); transform: translateX(-50%) scale(1.2); }

    /* MOBILE SETTINGS */
    @media (max-width: 768px) {
      #menu { display: none; }
      #hamburger { display: flex; position: absolute; top: 15px; right: 15px; z-index: 801; width: 30px; height: 25px; flex-direction: column; justify-content: space-between; pointer-events: auto; }
      #hamburger div { height: 3px; width: 100%; background: #fff; }
      #mobile-logo { display: block; position: absolute; top: 15px; left: 15px; height: 45px; z-index: 101; }
      #lang-selector { top: 20px; left: 50%; transform: translateX(-50%); }
      #hero-text .title { font-size: 6vw; } #hero-text .title-big { font-size: 12vw; }
      #mobile-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 800; display: flex; flex-direction: column; justify-content: center; align-items: center; clip-path: circle(0% at 100% 0%); transition: 0.6s ease; }
      #mobile-menu.open { clip-path: circle(150% at 100% 0%); }
    }
  </style>
</head>
<body data-time="sera">

  <div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="Logo"></div>
  <div id="gyro-overlay" class="active" style="position:fixed; inset:0; z-index:99999; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.8);"><button id="gyro-btn" style="padding:20px 40px; border-radius:40px; background:var(--main-color); color:#fff; border:none; font-weight:bold; cursor:pointer;">ENTRA NEL CATMA</button></div>

  <div id="menu">
    <a href="#" data-key="chi">CHI SIAMO</a><a href="#" data-key="mescita">MESCITA</a>
    <div class="logo-center">
      <img class="logo-white" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png">
      <img class="logo-red" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png">
    </div>
    <a href="#" data-key="bar">HI-FI BAR</a><a href="#" data-key="eventi">EVENTI</a>
  </div>

  <div id="hero">
    <div id="hero-layers">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp">
      <img class="layer desktop-layer" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp">
    </div>
  </div>

  <div id="hero-text-trail"><h2 class="title"></h2><h1 class="title-big">CATMA BAR</h1></div>
  <div id="hero-text"><h2 class="title"></h2><h1 class="title-big">CATMA BAR</h1><p class="subtitle"></p><a href="#" class="hero-cta">PRENOTA UN TAVOLO</a></div>

  <div id="content-overlay"><div class="close-btn">&times;</div><div class="content-box"></div></div>

  <script>
    let targetX = 0, targetY = 0, curX = 0, curY = 0;
    const isMobile = window.innerWidth <= 768;

    function applyText() {
      const h = new Date().getHours();
      const s = (h >= 9 && h < 18) ? 'giorno' : (h >= 18 || h < 2) ? 'sera' : 'chiuso';
      document.body.setAttribute('data-time', s);
      const t = { giorno: ["BUONGIORNO DA", "Cucina di alto livello e Vini Naturali"], sera: ["BENVENUTI AL", "L'Hi-Fi Bar di Piazza Marconi."], chiuso: ["IL CATMA È CHIUSO", "Giovanni ti aspetta domani."] };
      document.querySelectorAll('.title').forEach(el => el.innerHTML = t[s][0]);
      document.querySelector('.subtitle').innerHTML = t[s][1];
    }

    function loop() {
      curX += (targetX - curX) * 0.1; curY += (targetY - curY) * 0.1;
      document.querySelectorAll('.desktop-layer').forEach((l, i) => l.style.transform = `translate3d(${curX * (i+1) * 20}px, ${curY * (i+1) * 10}px, 0) scale(1.1)`);
      if(!isMobile) {
        document.getElementById('hero-text').style.transform = `translate(-50%, -50%) translate3d(${-curX * 100}px, ${-curY * 50}px, 0)`;
        document.getElementById('hero-text-trail').style.transform = `translate(-50%, -50%) translate3d(${-curX * 110}px, ${-curY * 55}px, 0)`;
      }
      requestAnimationFrame(loop);
    }

    window.addEventListener('mousemove', e => { targetX = (e.clientX / window.innerWidth) - 0.5; targetY = (e.clientY / window.innerHeight) - 0.5; });
    document.getElementById('gyro-btn').onclick = () => document.getElementById('gyro-overlay').classList.remove('active');
    document.querySelector('.close-btn').onclick = () => document.getElementById('content-overlay').classList.remove('active');

    window.onload = () => {
      applyText();
      loop();
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
        setTimeout(() => { document.body.classList.add('app-loaded'); }, 300);
      }, 1500);
    };
  </script>
</body>
</html>
