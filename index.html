<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catma Bar</title>
<style>
/* =========================
   RESET & BASE
========================= */
html, body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}
body, body * {
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
  cursor: none !important;
}

/* =========================
   LOADER
========================= */
#loader {
  position: fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  background-color: #b22222;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999999;
  overflow:hidden;
  transition: transform 0.8s ease;
}
#loader img {
  width:150px;
  height:auto;
  animation: rotateLogo 1s linear infinite;
}
@keyframes rotateLogo {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
#loader.hidden {
  transform: translateY(-100%);
  pointer-events:none;
}

/* =========================
   CURSORE PERSONALIZZATO
========================= */
#custom-cursor {
  position: fixed;
  top:0; left:0;
  width:25px; height:25px;
  background:black;
  border-radius:50%;
  pointer-events:none;
  transform: translate(-50%, -50%);
  z-index:99999;
  transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
  box-shadow:0 0 10px 3px rgba(178,34,34,0.6);
}

/* =========================
   HERO & LAYERS
========================= */
#hero {
  width:100%;
  height:100vh;
  position:relative;
  overflow:hidden;
}
.layer {
  position:absolute;
  width:120%;
  height:120%;
  top:-10%; left:-10%;
  object-fit:cover;
  pointer-events:none;
  transition: transform 0.5s ease, opacity 0.5s ease;
}
.layer.overlay-active {
  opacity:0.8;
  transform:scale(1.05);
}

/* =========================
   TESTO CENTRALE
========================= */
#hero-text {
  position:absolute;
  width:100%;
  top:150px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  color:#fff;
  z-index:90;
  pointer-events:none;
  text-shadow:1px 1px 5px #000;
}
#hero-text .subtitle { font-size:1.5vw; margin-top:25px; opacity:0.8; }
#hero-text .title { font-size:3vw; font-weight:bold; margin:5px 0 0 0; }
#hero-text .title-big { font-size:6vw; font-weight:bold; margin:0; }
#hero-text .title, #hero-text .title-big {
  animation: glowBreath 3s ease-in-out infinite;
}
@keyframes glowBreath {
  0%,100% { text-shadow: 0 0 4px rgba(255,255,255,0.7), 0 0 10px rgba(178,34,34,0.5); }
  50% { text-shadow: 0 0 8px rgba(255,255,255,1), 0 0 20px rgba(178,34,34,0.8); }
}

/* =========================
   HOTSPOTS
========================= */
#hotspot-layer {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:1000;
}
.hotspot, .hotspot.cta-btn {
  pointer-events:auto;
}
.hotspot {
  position:absolute;
  width:50px; height:50px;
  border-radius:50%;
  background:#b22222;
  box-shadow:0 0 20px rgba(178,34,34,0.9);
  transform:translate(-50%,-50%);
  animation:pulse 2s infinite;
  cursor:pointer;
  z-index:50;
}
@keyframes pulse {
  0%,100% { transform:translate(-50%,-50%) scale(1); }
  50% { transform:translate(-50%,-50%) scale(1.2); }
}
.hotspot-label {
  position:absolute;
  pointer-events:none;
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:4px 10px;
  border-radius:4px;
  font-size:14px;
  font-weight:500;
  white-space:nowrap;
  opacity:0;
  transform:translate(-50%, -10px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index:100;
}
.hotspot:hover .hotspot-label { opacity:1; transform:translate(-50%, -30px); }
.hotspot-label.active { opacity:1 !important; transform:translate(-50%, -30px) !important; }

/* =========================
   OVERLAY
========================= */
#content-overlay {
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,.8);
  justify-content:center;
  align-items:center;
  z-index:2000;
  backdrop-filter: blur(5px);
  display:flex;
  opacity:0;
  visibility:hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}
#content-overlay.active { opacity:1; visibility:visible; }
.content-box {
  color:#fff;
  text-align:center;
  transform:scale(0);
  transition: transform 0.4s ease;
}

/* =========================
   MENU DESKTOP & MOBILE
========================= */
#menu {
  position:absolute;
  top:40px; left:50%;
  transform:translateX(-50%);
  width:90%;
  display:flex; align-items:center;
  z-index:100;
}
#menu a { flex:1; text-align:center; color:#fff; text-decoration:none; }
.logo-center { flex:1; display:flex; justify-content:center; }
.logo-center img { height:60px; }

#mobile-logo { display:none; position:absolute; top:20px; left:20px; height:40px; z-index:101; }
#hamburger { display:none; position:absolute; top:20px; right:20px; width:30px; height:25px; flex-direction:column; justify-content:space-between; cursor:pointer; z-index:101; }
#hamburger div { height:4px; background:#fff; }
#mobile-menu {
  display:none;
  position:fixed;
  width:100%; height:100%;
  background:rgba(0,0,0,.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:800;
}
#mobile-menu a { color:#fff; margin:15px 0; font-size:1.5rem; text-decoration:none; text-transform:uppercase; }
#mobile-menu .cta { border:2px solid #fff; padding:12px 25px; border-radius:30px; margin-top:20px; }
#mobile-menu img { height:60px; margin-bottom:20px; }
#mobile-menu .close-btn { position:absolute; top:100px; font-size:4rem; color:#fff; cursor:pointer; pointer-events:auto; z-index:99999; }

/* =========================
   FOOTER
========================= */
footer {
  position:fixed; bottom:0;
  width:100%;
  left:0;
  z-index:500;
  background:#b22222;
  color:#fff;
  font-family:sans-serif;
  box-sizing:border-box;
}
.footer-social { display:inline-flex; align-items:center; gap:10px; padding:10px; }
.footer-social img { width:20px; height:20px; object-fit:contain; vertical-align:middle; }

/* =========================
   RESPONSIVE
========================= */
@media(max-width:768px){
  #menu{display:none}
  #hamburger{display:flex}
  #mobile-logo{display:block}
  .hotspot{width:40px;height:40px;}
  #hero-text { top:35%; }
  #hero-text .title-big{ font-size:12vw; }
  #hero-text .title{ font-size:6vw; }
  #hero-text .subtitle{ font-size:3vw; }
}
@media (pointer: coarse), (max-width:768px){ #custom-cursor{ display:none !important; } }
@media(min-width:769px){ .mobile-layer{ display:none; } }

/* =========================
   FILTRI TEMPO
========================= */
body[data-time="giorno"] #hero { filter: brightness(1.2) saturate(0.35) hue-rotate(-5deg); }
body[data-time="sera"] #hero { filter: brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2); }
body[data-time="chiuso"] #hero { filter: brightness(0.2) saturate(0.5); }
#timeControls {
  position: fixed; top:120px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:650;
}
#timeControls button {
  padding:5px 10px;
  border:none; border-radius:150px;
  background:#b22222; color:white;
  cursor:pointer; font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition: background 0.3s ease;
}
#timeControls button:hover{ background:#ff4d4d; }

/* =========================
   GIROSCOPIO MOBILE
========================= */
#gyroBtn {
  position: fixed; top:35%; left:50%; transform:translate(-50%,-50%);
  width:250px; height:50px; background:#b22222; color:#fff;
  border:none; border-radius:150px;
  z-index:99999; font-size:1.5rem;
  cursor:pointer; box-shadow:0 0 15px rgba(255,255,255,0.5);
  animation: pulseBtn 1.5s ease-in-out infinite;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#gyroBtn:hover{ transform:translate(-50%,-50%) scale(1.05); box-shadow:0 0 25px rgba(255,255,255,0.6); }
#gyroBtn.hidden{ opacity:0; pointer-events:none; transform:translate(-50%,-50%) scale(0.8); }
@keyframes pulseBtn {
  0%,100%{ transform:translate(-50%,-50%) scale(1); box-shadow:0 0 15px rgba(255,255,255,0.5);}
  50%{ transform:translate(-50%,-50%) scale(1.08); box-shadow:0 0 25px rgba(255,255,255,0.6);}
}
#gyroOverlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:99998; pointer-events:none; opacity:0; transition:opacity 0.3s ease; }
#gyroOverlay.active{ opacity:1; }

</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="CATMA Logo"></div>

<!-- MENU DESKTOP -->
<div id="menu">
  <a href="#" data-key="chi">CHI SIAMO</a>
  <a href="#" data-key="mescita">MESCITA</a>
  <div class="logo-center"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png"></div>
  <a href="#" data-key="bar">BAR</a>
  <a href="#" data-key="eventi">EVENTI</a>
</div>

<!-- MOBILE LOGO & HAMBURGER -->
<img id="mobile-logo" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png">
<div id="hamburger"><div></div><div></div><div></div></div>

<!-- MOBILE MENU OVERLAY -->
<div id="mobile-menu">
  <div class="close-btn">&times;</div>
  <a href="#" data-key="chi">CHI SIAMO</a>
  <a href="#" data-key="mescita">MESCITA</a>
  <a href="#" data-key="bar">BAR</a>
  <a href="#" data-key="eventi">EVENTI</a>
  <a href="#" class="cta" data-key="prenota">PRENOTA</a>
</div>

<!-- SCRITTA FISSA CENTRALE -->
<div id="hero-text">
  <h2 class="title">BENVENUTI AL</h2>
  <h1 class="title-big">CATMA BAR</h1>
  <p class="subtitle">Via delle Sirene, 13 - Lido di Jesolo (VE)</p>
</div>

<!-- HERO LAYERS -->
<div id="hero">
  <!-- Layers desktop -->
  <img class="layer desktop-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp">
  <img class="layer desktop-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp">
  <img class="layer desktop-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp">

  <!-- Layers mobile -->
  <img class="layer mobile-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774791189/Catma-background-mobile_oqmkn0.webp">
  <img class="layer mobile-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792265/Catma-midground-mobile_xvwur8.webp">
  <img class="layer mobile-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802973/Catma-foreground-mobile_wpnzl9.webp">

  <!-- HOTSPOTS -->
  <div id="hotspot-layer">
    <div class="hotspot" data-key="chi" data-x-desktop="10" data-y-desktop="40" data-x-mobile="5" data-y-mobile="45"></div>
    <div class="hotspot" data-key="mescita" data-x-desktop="27" data-y-desktop="68" data-x-mobile="5" data-y-mobile="60"></div>
    <div class="hotspot cta-btn" data-key="prenota" data-x-desktop="50" data-y-desktop="55" data-x-mobile="50" data-y-mobile="50">PRENOTA</div>
    <div class="hotspot" data-key="eventi" data-x-desktop="85" data-y-desktop="45" data-x-mobile="95" data-y-mobile="50"></div>
    <div class="hotspot" data-key="bar" data-x-desktop="85" data-y-desktop="65" data-x-mobile="90" data-y-mobile="65"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="content-overlay">
  <div class="close-btn">&times;</div>
  <div class="content-box"></div>
</div>

<!-- FOOTER -->
<footer>
  <div style="display:flex; justify-content:space-between; flex-wrap:wrap; align-items:center;">
    <div style="padding:10px; flex-wrap:wrap; font-size:10px; width:100%; text-align:center;">
      <p>Via delle Sirene 13, Lido di Jesolo (VE) | P.IVA: 01234567890</p>
    </div>
    <div class="footer-social">
      <a href="https://www.instagram.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-01_n8pedz.png"></a>
      <a href="https://www.facebook.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-02_qpgtp7.png"></a>
    </div>
  </div>
  <div style="text-align:center; margin-top:8px; font-size:10px; padding:10px; background-color:#000;">
    &copy; <span id="year"></span> Catma Bar. Tutti i diritti riservati.
  </div>
</footer>

<script>
// =========================
// ANNO DINAMICO
// =========================
document.getElementById('year').innerText = new Date().getFullYear();

// =========================
// VARIABILI PRINCIPALI
// =========================
const hero = document.getElementById('hero');
let layers = {};
let mouseX=0, mouseY=0, isZoomed=false;
const hotspots = document.querySelectorAll('.hotspot');
const overlay = document.getElementById('content-overlay');
const contentBox = overlay.querySelector('.content-box');
const loader = document.getElementById('loader');
const cursor = document.createElement('div');
cursor.id = 'custom-cursor';
document.body.appendChild(cursor);

// =========================
// CARICAMENTO & LOADER
// =========================
window.addEventListener('load', ()=>{
  loader.classList.add('hidden');
  setTimeout(()=>loader.remove(), 1000);
});

// =========================
// CURSORE
// =========================
document.addEventListener('mousemove', e=>{
  mouseX = e.clientX; mouseY = e.clientY;
  cursor.style.transform = `translate(${mouseX}px,${mouseY}px)`;
});

// =========================
// PARALLASSE MOUSE
// =========================
function initLayers(){
  layers = document.querySelectorAll('.parallax-target');
}
initLayers();

document.addEventListener('mousemove', e=>{
  layers.forEach(layer=>{
    const speed = layer.classList.contains('foreground') ? 0.08 : layer.classList.contains('midground') ? 0.04 : 0.01;
    layer.style.transform = `translate(${(e.clientX - window.innerWidth/2)*speed}px, ${(e.clientY - window.innerHeight/2)*speed}px)`;
  });
});

// =========================
// HOTSPOT CLICK & LABEL
// =========================
hotspots.forEach(h=>{
  // CREA LABEL
  const label = document.createElement('div');
  label.classList.add('hotspot-label');
  label.innerText = h.dataset.key.toUpperCase();
  h.appendChild(label);
  // CLICK
  h.addEventListener('click', ()=>{
    openOverlay(h.dataset.key);
  });
});

// =========================
// OVERLAY FUNCTIONS
// =========================
function openOverlay(key){
  overlay.classList.add('active');
  contentBox.style.transform='scale(1)';
  contentBox.innerHTML = `<h2>${key.toUpperCase()}</h2><p>Contenuti per la sezione "${key}"</p>`;
}
overlay.querySelector('.close-btn').addEventListener('click', ()=>{
  overlay.classList.remove('active');
  contentBox.style.transform='scale(0)';
});

// =========================
// MENU MOBILE
// =========================
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobile-menu');
hamburger.addEventListener('click', ()=> mobileMenu.style.display='flex');
mobileMenu.querySelector('.close-btn').addEventListener('click', ()=> mobileMenu.style.display='none');

// =========================
// FILTRI TEMPO
// =========================
document.body.dataset.time='giorno';
const timeBtns = ['giorno','sera','chiuso'];
timeBtns.forEach(t=>{
  const btn = document.createElement('button');
  btn.innerText=t.toUpperCase();
  btn.onclick = ()=> document.body.dataset.time = t;
  document.body.appendChild(btn);
});

// =========================
// GIROSCOPIO MOBILE
// =========================
let gyroEnabled=false;
const gyroBtn = document.createElement('button');
gyroBtn.id='gyroBtn'; gyroBtn.innerText='ABILITA GIROSCOPIO';
document.body.appendChild(gyroBtn);
const gyroOverlay = document.createElement('div'); gyroOverlay.id='gyroOverlay'; document.body.appendChild(gyroOverlay);

gyroBtn.addEventListener('click', ()=>{
  if(window.DeviceOrientationEvent){
    DeviceOrientationEvent.requestPermission?.().then(res=>{
      if(res==='granted'){
        window.addEventListener('deviceorientation', e=>{
          layers.forEach(layer=>{
            const speed = layer.classList.contains('foreground') ? 0.1 : layer.classList.contains('midground') ? 0.05 : 0.02;
            layer.style.transform=`translate(${(e.gamma||0)*speed}px, ${(e.beta||0)*speed}px)`;
          });
        });
        gyroEnabled=true;
        gyroBtn.classList.add('hidden');
        gyroOverlay.classList.add('active');
      }
    });
  }
});

// =========================
// FINE SCRIPT
// =========================
</script>

</body>
</html>
