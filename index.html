<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catma Bar</title>
  <style>
    /* --- RESET & GLOBALS --- */
    html, body {
      margin: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif;
    }
    body, body * {
      -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
      cursor: none !important;
    }

    /* --- CURSORE CUSTOM --- */
    #custom-cursor {
      position: fixed; top: 0; left: 0; width: 25px; height: 25px; background: black;
      border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
      z-index: 99999; transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 10px 3px rgba(178,34,34,0.6);
      will-change: transform, box-shadow; /* Ottimizzazione hardware */
    }

    /* --- LOADER --- */
    #loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #b22222; display: flex; justify-content: center;
      align-items: center; z-index: 999999; overflow: hidden;
      transition: transform 0.8s ease;
    }
    #loader img { width: 150px; height: auto; animation: rotateLogo 1s linear infinite; }
    #loader.hidden { transform: translateY(-100%); pointer-events: none; }
    @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* --- HERO & LAYERS --- */
    #hero { width: 100%; height: 100vh; position: relative; overflow: hidden; }
    #hero-layers {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; transition: filter 0.5s ease;
      will-change: filter;
    }
    .layer {
      position: absolute; width: 115%; height: 115%; top: -7.5%; left: -7.5%;
      object-fit: cover; pointer-events: none;
      transition: opacity 0.5s ease; 
      /* Ottimizzazione: suggeriamo al browser che questi elementi cambieranno posizione di continuo */
      will-change: transform; 
    }
    .layer.smooth-zoom {
      transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease !important;
    }
    .layer.overlay-active { opacity: 0.8; }

    /* --- HERO TESTO CENTRALE --- */
    #hero-text {
      position: absolute; width: 100%; top: 150px; left: 50%;
      transform: translateX(-50%); text-align: center; color: #fff;
      z-index: 90; pointer-events: none; text-shadow: 1px 1px 5px #000;
      transition: opacity 0.25s ease;
    }
    #hero-text .subtitle { font-size: 1.5vw; margin-top: 25px; opacity: 0.8; }
    #hero-text .title { font-size: 3vw; margin: 5px 0 0 0; font-weight: bold; animation: glowBreath 3s ease-in-out infinite; }
    #hero-text .title-big { font-size: 6vw; margin: 0; font-weight: bold; animation: glowBreath 3s ease-in-out infinite; }
    @keyframes glowBreath {
      0%, 100% { text-shadow: 0 0 4px rgba(255,255,255,0.7), 0 0 10px rgba(178,34,34,0.5); }
      50% { text-shadow: 0 0 8px rgba(255,255,255,1), 0 0 20px rgba(178,34,34,0.8); }
    }

    /* --- HOTSPOTS --- */
    .hotspot {
      position: absolute; width: 50px; height: 50px; border-radius: 50%;
      background: #b22222; box-shadow: 0 0 20px rgba(178,34,34,.9);
      transform: translate3d(-50%,-50%, 0); animation: pulse 2s infinite;
      cursor: pointer; z-index: 50; transition: opacity 0.3s ease;
      will-change: transform, left, top;
    }
    .hotspot.hidden { opacity: 0; pointer-events: none; }
    @keyframes pulse {
      0% { box-shadow: 0 0 15px rgba(178,34,34,0.6); }
      50% { box-shadow: 0 0 30px rgba(178,34,34,1); }
      100% { box-shadow: 0 0 15px rgba(178,34,34,0.6); }
    }
    .hotspot[data-key="prenota"] {
      width: auto !important; min-width: 140px; border-radius: 30px !important;
      padding: 0 25px; display: flex; justify-content: center; align-items: center;
      font-weight: bold; color: #fff;
    }

    /* --- LABELS HOTSPOT --- */
    .hotspot-label {
      position: absolute; pointer-events: none; background: rgba(0,0,0,0.8);
      color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 14px;
      font-weight: 600; letter-spacing: 1px; white-space: nowrap;
      transform-origin: bottom center; transform: translate3d(-50%, 0px, 0) scale(0);
      opacity: 0; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
      z-index: 100; will-change: transform, opacity;
    }
    .hotspot:hover .hotspot-label, .hotspot-label.active {
      opacity: 1 !important; transform: translate3d(-50%, -45px, 0) scale(1) !important;
    }

    /* --- CONTENUTI POPUP --- */
    .elegant-content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .elegant-title { font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 10px 0; font-weight: 300; text-align: center; }
    .elegant-divider { width: 50px; height: 2px; background-color: #b22222; margin-bottom: 20px; }
    .elegant-desc { font-size: 1.1rem; line-height: 1.6; max-width: 400px; font-weight: 300; opacity: 0.9; text-align: center; }
    .cta-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
    .cta-btn {
      border: 2px solid #fff; padding: 12px 25px; border-radius: 30px; text-decoration: none;
      font-weight: 600; background: rgba(178, 34, 34, 0.9); color: #fff;
      box-shadow: 0 0 15px rgba(178, 34, 34, 0.6); transition: all 0.25s ease; cursor: none;
    }
    .cta-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(178,34,34,0.9); }
    .cta-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.4); }

    /* --- NAVBAR E MENU MOBILE --- */
    #menu {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      width: 90%; display: flex; align-items: center; z-index: 100;
    }
    #menu a { flex: 1; text-align: center; color: #fff; text-decoration: none; font-weight: bold; letter-spacing: 1px; }
    .logo-center { flex: 1; display: flex; justify-content: center; }
    .logo-center img { height: 60px; }
    #mobile-logo { display: none; position: absolute; top: 20px; left: 20px; height: 40px; z-index: 101; }
    #hamburger {
      display: none; position: absolute; top: 25px; right: 25px; width: 30px; height: 20px;
      flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 801;
    }
    #hamburger div { height: 3px; background: #fff; transition: all 0.3s ease; }
    #mobile-menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,.95); display: flex; justify-content: center;
      align-items: center; flex-direction: column; z-index: 800;
      clip-path: circle(0px at calc(100% - 40px) 35px);
      transition: clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1); pointer-events: none;
    }
    #mobile-menu.open { clip-path: circle(150% at calc(100% - 40px) 35px); pointer-events: auto; }
    #mobile-menu a { color: #fff; margin: 15px 0; font-size: 1.5rem; text-decoration: none; text-transform: uppercase; letter-spacing: 2px;}

    /* --- OVERLAY POPUP --- */
    #content-overlay {
      position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,.80);
      justify-content: center; align-items: center; z-index: 700; backdrop-filter: blur(5px);
      display: flex; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #content-overlay.active { opacity: 1; visibility: visible; }
    .content-box { color: #fff; text-align: center; transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #content-overlay.active .content-box { transform: scale(1); }
    .close-btn { position: absolute; top: 30px; right: 30px; font-size: 3rem; color: #fff; cursor: pointer; pointer-events: auto; z-index: 999; }

    /* --- PULSANTI DEBUG TEMPO --- */
    #timeControls {
      position: fixed; top: 115px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; z-index: 650;
    }
    #timeControls button {
      padding: 6px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 15px;
      background: rgba(0,0,0,0.6); color: white; cursor: pointer; font-size: 11px;
      backdrop-filter: blur(4px); transition: all 0.3s ease;
    }
    #timeControls button:hover, #timeControls button.active-debug {
      background: #b22222; border-color: #b22222;
    }

    /* --- GIROSCOPIO BTN --- */
    #gyroBtn {
      position: fixed; top: 35%; left: 50%; transform: translate(-50%, -50%);
      width: 250px; height: 50px; background: #b22222; color: #fff; border: none; border-radius: 150px;
      z-index: 99999; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.5);
      animation: pulseBtn 1.5s ease-in-out infinite;
    }
    #gyroBtn.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) scale(0.8); transition: 0.3s; }
    @keyframes pulseBtn {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.6); }
    }
    #gyroOverlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.7); z-index: 99998; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    }
    #gyroOverlay.active { opacity: 1; pointer-events: auto; }

    /* --- FILTRI TEMPO --- */
    body[data-time="giorno"] #hero-layers { filter: brightness(1.2) saturate(0.35) hue-rotate(-5deg); }
    body[data-time="sera"] #hero-layers { filter: brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2); }
    body[data-time="chiuso"] #hero-layers { filter: brightness(0.2) saturate(0.5); }

    /* --- FOOTER CENTRATO --- */
    footer {
      background: #111; color: #ccc; width: 100vw; position: fixed;
      bottom: 0; left: 0; z-index: 500; display: flex; flex-direction: column; font-size: 13px;
    }
    .footer-top {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 12px 25px; background: #b22222; color: #fff; gap: 10px; text-align: center;
    }
    .footer-top-info p { margin: 0; font-weight: bold; letter-spacing: 0.5px;}
    .footer-social { display: flex; gap: 15px; justify-content: center; }
    .footer-social img { width: 22px; height: 22px; filter: brightness(0) invert(1); transition: transform 0.2s; }
    .footer-social a:hover img { transform: scale(1.2); }
    .footer-bottom {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 10px 25px; background: #000; gap: 8px; text-align: center;
    }
    .footer-links a { color: #888; text-decoration: none; margin: 0 10px; transition: color 0.2s;}
    .footer-links a:hover { color: #fff; }

    /* --- MEDIA QUERIES --- */
    @media (max-width: 768px) {
      #menu { display: none; } #hamburger { display: flex; } #mobile-logo { display: block; }
      #hero-text { top: 20%; } #hero-text .title-big { font-size: 12vw; }
      #hero-text .title { font-size: 6vw; } #hero-text .subtitle { font-size: 3vw; }
      .hotspot[data-key="prenota"] { min-width: 110px; height: 45px; font-size: 13px; padding: 0 15px;}
      .hotspot { width: 40px; height: 40px; }
      .footer-bottom { font-size: 11px; }
    }
    @media (pointer: coarse), (max-width: 768px) { #custom-cursor { display: none !important; } }
    @media (min-width: 769px) { .mobile-layer { display: none; } }
  </style>
</head>
<body>

  <div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="CATMA Logo"></div>

  <div id="menu">
    <a href="#" data-key="chi">CHI SIAMO</a>

    <div id="hero-layers">
      <img class="layer desktop-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp">
      <img class="layer desktop-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp">
      <img class="layer desktop-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp">

      <img class="layer mobile-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774791189/Catma-background-mobile_oqmkn0.webp">
      <img class="layer mobile-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774917597/Catma-midground-mobile_xvwur8.webp">
      <img class="layer mobile-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802973/Catma-foreground-mobile_wpnzl9.webp">
    </div>

    <div class="hotspot" data-key="eventi" data-x-desktop="85" data-y-desktop="38" data-x-mobile="85" data-y-mobile="40"></div>
    <div class="hotspot" data-key="bar" data-x-desktop="38" data-y-desktop="75" data-x-mobile="35" data-y-mobile="70"></div>
  </div>

  <footer>

      <div class="footer-top-info"><p>Via delle Sirene 13, Lido di Jesolo (VE) | P.IVA: 01234567890</p></div>
      <div class="footer-social">
        <a href="https://www.instagram.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-01_n8pedz.png" alt="Instagram"></a>
        <a href="https://www.facebook.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-02_qpgtp7.png" alt="Facebook"></a>
      </div>
    </div>
    <div class="footer-bottom">
      <div>&copy; <span id="year"></span> Catma Bar. Tutti i diritti riservati.</div>
      <div class="footer-links"><a href="#">Privacy Policy</a> | <a href="#">Cookie Policy</a></div>
    </div>
  </footer>

  <script>
    document.getElementById('year').innerText = new Date().getFullYear();
    
    const hero = document.getElementById('hero');
    const heroLayers = document.getElementById('hero-layers');
    let layers = {};
    const hotspots = document.querySelectorAll('.hotspot');
    const overlay = document.getElementById('content-overlay');
    const contentBox = overlay.querySelector('.content-box');
    let isZoomed = false;
    let manualTimeOverride = false; // Flag per i tasti debug

    // Logica Lerp
    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;
    let rafId = null; // ID per gestire il requestAnimationFrame

    const map = { chi: { label: 'CHI SIAMO' }, mescita: { label: 'MESCITA' }, prenota: { label: 'PRENOTA' }, eventi: { label: 'EVENTI' }, bar: { label: 'BAR' } };

    const contentMap = {
      chi: `<div class="elegant-content"><h1 class="elegant-title">Chi siamo</h1><div class="elegant-divider"></div><p class="elegant-desc">CATMA BAR è un punto di riferimento al Lido di Jesolo. Un rifugio per anime notturne, dove la ricerca musicale incontra la profonda cultura del bere di qualità, creando connessioni umane autentiche.</p></div>`,
      mescita: `<div class="elegant-content"><h1 class="elegant-title">Mescita</h1><div class="elegant-divider"></div><p class="elegant-desc">Una selezione rigorosa e appassionata di vini naturali che raccontano il territorio, birre artigianali di carattere e cocktail essenziali creati con materie prime d'eccellenza.</p></div>`,
      eventi: `<div class="elegant-content"><h1 class="elegant-title">Eventi</h1><div class="elegant-divider"></div><p class="elegant-desc">Il ritmo della notte prende vita qui. Dj set curati, performance dal vivo e serate speciali ogni settimana, per accompagnare i tuoi momenti di evasione.</p></div>`,
      bar: `<div class="elegant-content"><h1 class="elegant-title">Il Bar</h1><div class="elegant-divider"></div><p class="elegant-desc">Uno spazio intimo tra luce e ombra, progettato minuziosamente per farti vivere un'esperienza notturna avvolgente, accompagnato da vibrazioni uniche.</p></div>`,
      prenota: `<div class="elegant-content"><h1 class="elegant-title">Prenota un tavolo</h1><div class="elegant-divider"></div><p class="elegant-desc">Assicurati il tuo spazio esclusivo al Catma. Scrivici comodamente su WhatsApp oppure chiamaci direttamente per riservare un tavolo.</p><div class="cta-group"><a href="https://wa.me/393XXXXXXXXX?text=Ciao" target="_blank" class="cta-btn">WhatsApp</a><a href="tel:+393XXXXXXXXX" class="cta-btn secondary">Chiama</a></div></div>`
    };

    function setLayers() {
      const isMobile = 'ontouchstart' in window;
      layers = isMobile ? {
        background: heroLayers.querySelector('.mobile-layer.background'),
        midground: heroLayers.querySelector('.mobile-layer.midground'),
        foreground: heroLayers.querySelector('.mobile-layer.foreground')
      } : {
        background: heroLayers.querySelector('.desktop-layer.background'),
        midground: heroLayers.querySelector('.desktop-layer.midground'),
        foreground: heroLayers.querySelector('.desktop-layer.foreground')
      };
      updateHotspots();
    }

    function updateHotspots() {
      const isMobile = 'ontouchstart' in window;
      hotspots.forEach(h => {
        const ox = isMobile ? h.dataset.xMobile/100 * hero.clientWidth : h.dataset.xDesktop/100 * hero.clientWidth;
        const oy = isMobile ? h.dataset.yMobile/100 * hero.clientHeight : h.dataset.yDesktop/100 * hero.clientHeight;
        h.dataset.ox = ox; h.dataset.oy = oy;
      });
      renderParallax(targetX, targetY);
    }

    function renderParallax(x, y) {
      const maxOffset = { background:{x:30,y:15}, midground:{x:60,y:30}, foreground:{x:90,y:45} };
      const baseScale = ('ontouchstart' in window) ? 1.05 : 1;

      // Utilizziamo translate3d per attivare l'accelerazione hardware (GPU)
      if(layers.background) layers.background.style.transform = `translate3d(${x*maxOffset.background.x}px, ${y*maxOffset.background.y}px, 0) scale(${baseScale})`;
      if(layers.midground) layers.midground.style.transform = `translate3d(${x*maxOffset.midground.x}px, ${y*maxOffset.midground.y}px, 0) scale(${baseScale})`;
      if(layers.foreground) layers.foreground.style.transform = `translate3d(${x*maxOffset.foreground.x}px, ${y*maxOffset.foreground.y}px, 0) scale(${baseScale})`;

      const refX = x * maxOffset.midground.x;
      const refY = y * maxOffset.midground.y;

      hotspots.forEach(h => {
        if(h.classList.contains('hidden')) return;
        const ox = parseFloat(h.dataset.ox);
        const oy = parseFloat(h.dataset.oy);
        // Utilizziamo translate3d anche sugli hotspot
        h.style.transform = `translate3d(calc(-50% + ${ox + refX}px), calc(-50% + ${oy + refY}px), 0)`;
        h.style.left = '0'; // resettato perché gestito dal translate3d
        h.style.top = '0';
      });
    }

    function parallaxLoop() {
      // Se NON siamo zoomati, calcola il Lerp e renderizza
      if (!isZoomed) {
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;
        renderParallax(currentX, currentY);
        rafId = requestAnimationFrame(parallaxLoop);
      }
    }
    
    // Inizializza loop
    rafId = requestAnimationFrame(parallaxLoop);

    hero.addEventListener('mousemove', e => {
      if('ontouchstart' in window) return;
      const r = hero.getBoundingClientRect();
      targetX = (e.clientX - r.left)/r.width - 0.5;
      targetY = (e.clientY - r.top)/r.height - 0.5;
    });

    // --- GIROSCOPIO OTTIMIZZATO ---
    if('ontouchstart' in window) {
      const gyroOverlay = document.createElement('div');
      gyroOverlay.id = 'gyroOverlay';
      document.body.appendChild(gyroOverlay);

      const gyroBtn = document.createElement('button');
      gyroBtn.id = 'gyroBtn';
      gyroBtn.innerText = 'Attiva Visuale 3D';
      document.body.appendChild(gyroBtn);

      setTimeout(() => gyroOverlay.classList.add('active'), 100);

      const enableGyro = () => {
        gyroBtn.classList.add('hidden');
        gyroOverlay.classList.remove('active');
        window.addEventListener('deviceorientation', e => {
          if(isZoomed) return;
          // Aumentata sensibilità: diviso per 20 invece che per 40. Richiede meno inclinazione.
          targetX += ((e.gamma || 0) / 20 - targetX) * 0.15;
          targetY += ((e.beta || 0) / 20 - targetY) * 0.15;
          targetX = Math.max(-1, Math.min(1, targetX));
          targetY = Math.max(-1, Math.min(1, targetY));
        });
      };

      gyroBtn.addEventListener('click', () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().then(permissionState => {
              if (permissionState === 'granted') enableGyro();
              else { alert("Accesso al giroscopio negato."); gyroBtn.classList.add('hidden'); gyroOverlay.classList.remove('active'); }
          }).catch(console.error);
        } else { enableGyro(); }
      });
    }

    // --- LOGICA ZOOM ---
    function zoomTo(key) {
      if(isZoomed) {
        contentBox.style.transform = 'scale(0)';
        setTimeout(() => { contentBox.innerHTML = contentMap[key]; contentBox.style.transform = 'scale(1)'; }, 300);
        return;
      }
      
      const h = Array.from(hotspots).find(el => el.dataset.key === key);
      if(!h) return;

      // FERMA IL LOOP per non sovraccaricare il telefono
      isZoomed = true;
      cancelAnimationFrame(rafId);

      const tx = parseFloat(h.dataset.ox);
      const ty = parseFloat(h.dataset.oy);
      const cx = hero.clientWidth / 2;
      const cy = hero.clientHeight / 2;
      const dx = cx - tx;
      const dy = cy - ty;

      Object.values(layers).forEach(l => { if(l) l.classList.add('smooth-zoom', 'overlay-active'); });

      setTimeout(() => {
        if(layers.background) layers.background.style.transform = `translate3d(${dx*0.1}px,${dy*0.1}px, 0) scale(1.15)`;
        if(layers.midground) layers.midground.style.transform = `translate3d(${dx*0.3}px,${dy*0.3}px, 0) scale(1.25)`;
        if(layers.foreground) layers.foreground.style.transform = `translate3d(${dx*0.5}px,${dy*0.5}px, 0) scale(1.4)`;
      }, 10);

      contentBox.innerHTML = contentMap[key];
      overlay.classList.add('active');
      setTimeout(() => { contentBox.style.transform = 'scale(1)'; }, 150);
      hotspots.forEach(hot => hot.classList.add('hidden'));
    }

    function resetZoom() {
      contentBox.style.transform = 'scale(0)';
      setTimeout(() => { overlay.classList.remove('active'); }, 300);
      hotspots.forEach(hot => hot.classList.remove('hidden'));
      Object.values(layers).forEach(l => { if(l) l.classList.remove('overlay-active'); });
      
      renderParallax(currentX, currentY);

      setTimeout(() => {
        Object.values(layers).forEach(l => { if(l) l.classList.remove('smooth-zoom'); });
        isZoomed = false;
        // RIATTIVA IL LOOP
        rafId = requestAnimationFrame(parallaxLoop);
      }, 800);
    }

    // --- EVENT LISTENER MENU E HOTSPOT ---
    hotspots.forEach(h => h.addEventListener('click', () => zoomTo(h.dataset.key)));
    document.querySelectorAll('#menu a, #mobile-menu a').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault(); zoomTo(a.dataset.key);
        document.getElementById('mobile-menu').classList.remove('open');
      });
    });

    document.getElementById('hamburger').onclick = () => document.getElementById('mobile-menu').classList.toggle('open');
    overlay.querySelector('.close-btn').onclick = resetZoom;
    document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && isZoomed) resetZoom(); });
    overlay.addEventListener('click', (e) => { if(!contentBox.contains(e.target)) resetZoom(); });
    overlay.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation(); resetZoom(); });

    // Creazione Labels
    hotspots.forEach(h => {
      if(h.dataset.key !== 'prenota') {
        const label = document.createElement('div');
        label.className = 'hotspot-label';
        label.innerText = map[h.dataset.key].label;
        h.appendChild(label);
      }
      if('ontouchstart' in window) {
        h.addEventListener('click', (e) => {
          const label = h.querySelector('.hotspot-label');
          if(label) {
            const currentlyActive = label.classList.contains('active');
            document.querySelectorAll('.hotspot-label').forEach(l => l.classList.remove('active'));
            if(!currentlyActive) label.classList.add('active');
          }
          zoomTo(h.dataset.key); e.stopPropagation();
        });
      }
    });

    if('ontouchstart' in window) {
      document.addEventListener('touchstart', (e) => {
        if(!e.target.closest('.hotspot')) document.querySelectorAll('.hotspot-label').forEach(l => l.classList.remove('active'));
      });
    }

    // --- CURSORE CUSTOM (Ottimizzato) ---
    const customCursor = document.createElement('div');
    customCursor.id = 'custom-cursor';
    document.body.appendChild(customCursor);
    document.addEventListener('mousemove', e => { 
      // Trasforma con GPU per evitare lag del cursore
      customCursor.style.transform = `translate3d(calc(-50% + ${e.clientX}px), calc(-50% + ${e.clientY}px), 0)`;
    });
    // Rimuoviamo il translate(-50%, -50%) dai listener del mousedown/up perché ora lo gestiamo nel mousemove
    document.addEventListener('mousedown', () => { customCursor.style.boxShadow = '0 0 15px 5px rgba(178,34,34,0.8)'; customCursor.style.width = '35px'; customCursor.style.height = '35px';});
    document.addEventListener('mouseup', () => { customCursor.style.boxShadow = '0 0 10px 3px rgba(178,34,34,0.6)'; customCursor.style.width = '25px'; customCursor.style.height = '25px'; });

    // --- GESTIONE TEMPO E FILTRI ---
    function setTimeVisuals(state) {
      document.body.setAttribute('data-time', state);
      void heroLayers.offsetWidth; // Trigger reflow per assicurare transizione
      requestAnimationFrame(() => {
        heroLayers.style.filter = state === 'giorno' ? 'brightness(1.2) saturate(0.35) hue-rotate(-5deg)' : state === 'sera' ? 'brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2)' : 'brightness(0.2) saturate(0.5)';
      });
      const t = state === 'giorno' ? { title: "BUONGIORNO DA", titleBig: "CATMA BAR", subtitle: "Via delle Sirene, 13 - Lido di Jesolo (VE)" } : state === 'sera' ? { title: "BENVENUTI AL", titleBig: "CATMA BAR", subtitle: "Via delle Sirene, 13 - Lido di Jesolo (VE)" } : { title: "SEMBRA CHE <br> IL CATMA SIA", titleBig: "CHIUSO", subtitle: "Torna domani per bere un'altra ombra!" };
      const heroText = document.getElementById('hero-text');
      heroText.style.opacity = 0;
      setTimeout(() => { heroText.innerHTML = `<h2 class="title">${t.title}</h2><h1 class="title-big">${t.titleBig}</h1><p class="subtitle">${t.subtitle}</p>`; heroText.style.opacity = 1; }, 250);

      // Aggiorna stile tasti debug
      document.querySelectorAll('#timeControls button').forEach(btn => btn.classList.remove('active-debug'));
      document.querySelector(`#timeControls button[data-time="${state}"]`).classList.add('active-debug');
    }

    function applyTimeFilter() {
      if (manualTimeOverride) return; // Se l'utente ha usato i tasti debug, non aggiornare in automatico
      const hour = new Date().getHours();
      let state = (hour >= 9 && hour < 18) ? 'giorno' : (hour >= 18 || hour < 2) ? 'sera' : 'chiuso';
      setTimeVisuals(state);
    }

    // Tasti Debug
    document.querySelectorAll('#timeControls button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        manualTimeOverride = true; // Blocca il timer automatico
        setTimeVisuals(e.target.dataset.time);
      });
    });

    // --- INIT ---
    const loader = document.getElementById('loader');
    const loaderStart = Date.now();
    let isLoaderHidden = false;
    function tryHideLoader() {
      if (isLoaderHidden) return;
      setTimeout(() => { loader.classList.add('hidden'); isLoaderHidden = true; }, Math.max(2000 - (Date.now() - loaderStart), 0));
    }
    window.addEventListener('load', tryHideLoader);
    document.addEventListener('DOMContentLoaded', tryHideLoader);
    
    setLayers(); 
    applyTimeFilter(); 
    setInterval(applyTimeFilter, 60*60*1000); 
    window.addEventListener('resize', setLayers);
  </script>
</body>
</html>
