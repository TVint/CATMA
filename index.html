<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catma Bar</title>
<style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:sans-serif; background:#000; }
body, body * { -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none; cursor:none !important; }

/* LOADER */
#loader {
  position:fixed; top:0; left:0; width:100vw; height:100vh;
  background:#b22222; display:flex; justify-content:center; align-items:center;
  z-index:999999; transition:transform 0.8s ease; overflow:hidden;
}
#loader img { width:150px; height:auto; animation:rotateLogo 1s linear infinite; }
@keyframes rotateLogo { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
#loader.hidden { transform:translateY(-100%); pointer-events:none; }

/* HERO */
#hero { width:100%; height:100vh; position:relative; overflow:hidden; }
.layer { position:absolute; width:120%; height:120%; top:-10%; left:-10%; object-fit:cover; pointer-events:none; transition:transform 0.5s ease; }
.layer.overlay-active { opacity:0.8; transform:scale(1.05); }

/* HOTSPOTS */
#hotspot-layer { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1000; pointer-events:none; }
.hotspot, .hotspot.cta-btn { position:absolute; width:50px;height:50px; border-radius:50%; background:#b22222; box-shadow:0 0 20px rgba(178,34,34,.9); transform:translate(-50%,-50%); animation:pulse 2s infinite; cursor:pointer; pointer-events:auto; z-index:50; }
.hotspot.cta-btn { width:auto; padding:10px 20px; border-radius:50px; font-weight:600; text-align:center; box-shadow:0 0 15px rgba(178,34,34,0.6); background:rgba(178,34,34,0.9); color:#fff; }
.hotspot.cta-btn.secondary { background:transparent; border:1px solid rgba(255,255,255,0.4); }
@keyframes pulse {0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}100%{transform:translate(-50%,-50%) scale(1)}}

/* LABEL HOTSPOTS */
.hotspot-label { position:absolute; pointer-events:none; background:rgba(0,0,0,0.7); color:#fff; padding:4px 10px; border-radius:4px; font-size:14px; font-weight:500; white-space:nowrap; opacity:0; transform:translate(-50%, -10px); transition:opacity 0.2s ease, transform 0.2s ease; z-index:100; }
.hotspot:hover .hotspot-label { opacity:1; transform:translate(-50%, -30px); }
.hotspot-label.active { opacity:1 !important; transform:translate(-50%, -30px) !important; }

/* HERO TEXT */
#hero-text { position:absolute; top:150px; left:50%; transform:translateX(-50%); text-align:center; color:#fff; z-index:90; pointer-events:none; text-shadow:1px 1px 5px #000; }
#hero-text .subtitle{ font-size:1.5vw; margin-top:25px; opacity:0.8; }
#hero-text .title{ font-size:3vw; margin:5px 0 0 0; font-weight:bold; animation:glowBreath 3s ease-in-out infinite; }
#hero-text .title-big{ font-size:6vw; margin:0; font-weight:bold; animation:glowBreath 3s ease-in-out infinite; }
@keyframes glowBreath {0%,100%{text-shadow:0 0 4px rgba(255,255,255,0.7),0 0 10px rgba(178,34,34,0.5);}50%{text-shadow:0 0 8px rgba(255,255,255,1),0 0 20px rgba(178,34,34,0.8);}}

/* OVERLAY */
#content-overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,.8); backdrop-filter:blur(5px); opacity:0; visibility:hidden; z-index:2000; transition:opacity 0.4s ease, visibility 0.4s ease; }
#content-overlay.active { opacity:1; visibility:visible; }
.content-box { color:#fff; text-align:center; transform:scale(0); transition:transform 0.4s ease; max-width:80%; }
#content-overlay .close-btn { position:absolute; top:20px; right:20px; font-size:3rem; color:#fff; cursor:pointer; pointer-events:auto; z-index:3000; }

/* CURSORE PERSONALIZZATO */
#custom-cursor { position:fixed; top:0; left:0; width:25px; height:25px; border-radius:50%; background:black; pointer-events:none; transform:translate(-50%,-50%); z-index:99999; transition:transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease; box-shadow:0 0 10px 3px rgba(178,34,34,0.6); }

/* FILTRI TEMPO */
body[data-time="giorno"] #hero{ filter:brightness(1.2) saturate(0.35) hue-rotate(-5deg);}
body[data-time="sera"] #hero{ filter:brightness(0.95) contrast(1.1) sepia(0.3) saturate(1.2);}
body[data-time="chiuso"] #hero{ filter:brightness(0.2) saturate(0.5);}

/* PULSANTI CONTROLLO TEMPO */
#timeControls { position:fixed; top:120px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:650; }
#timeControls button { padding:5px 10px; border:none; border-radius:150px; background:#b22222; color:white; cursor:pointer; font-weight:bold; box-shadow:0 4px 10px rgba(0,0,0,0.3); pointer-events:auto;}
#timeControls button:hover{ background:#ff4d4d; }

/* MENU DESKTOP */
#menu{position:absolute;top:40px;left:50%;transform:translateX(-50%);width:90%;display:flex;align-items:center;z-index:100;}
#menu a{flex:1;text-align:center;color:#fff;text-decoration:none;}
.logo-center{flex:1;display:flex;justify-content:center;}
.logo-center img{height:60px;}

/* MOBILE MENU */
#mobile-logo{display:none;position:absolute;top:20px;left:20px;height:40px;z-index:101;}
#hamburger{display:none;position:absolute;top:20px;right:20px;width:30px;height:25px;flex-direction:column;justify-content:space-between;cursor:pointer;z-index:101;}
#hamburger div{height:4px;background:#fff;}
#mobile-menu{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,.9);justify-content:center;align-items:center;flex-direction:column;z-index:800;}
#mobile-menu a{color:#fff;margin:15px 0;font-size:1.5rem;text-decoration:none;text-transform:uppercase;}
#mobile-menu .cta{border:2px solid #fff;padding:12px 25px;border-radius:30px;margin-top:20px;}
#mobile-menu img{height:60px;margin-bottom:20px;}
#mobile-menu .close-btn{position:absolute;top:100px;font-size:4rem;color:#fff;cursor:pointer;pointer-events:auto;z-index:99999;}

/* FOOTER */
footer{position:fixed;bottom:0;width:100%;left:0;z-index:2000;background:#b22222;color:#fff;box-sizing:border-box;}
footer .footer-social{display:inline-flex;align-items:center;gap:10px;padding:10px;}
footer .footer-social img{width:20px;height:20px;object-fit:contain;}

/* MOBILE ADJUSTMENTS */
@media(max-width:768px){
  #menu{display:none;} #hamburger{display:flex;} #mobile-logo{display:block;}
  .hotspot{width:40px;height:40px;}
  #hero-text{top:35%;}
  #hero-text .title-big{font-size:12vw;} #hero-text .title{font-size:6vw;} #hero-text .subtitle{font-size:3vw;}
}
@media (pointer:coarse), (max-width:768px){ #custom-cursor{display:none !important;} }
@media(min-width:769px){ .mobile-layer{display:none;} }

/* GIROSCOPIO BUTTON */
#gyroBtn { position:fixed; top:35%; left:50%; transform:translate(-50%,-50%); width:250px; height:50px; background:#b22222; color:#fff; border:none; border-radius:150px; z-index:99999; font-size:1.5rem; cursor:pointer; box-shadow:0 0 15px rgba(255,255,255,0.5); animation:pulseBtn 1.5s ease-in-out infinite; transition:transform 0.2s ease, box-shadow 0.2s ease; }
#gyroBtn:hover{ transform:translate(-50%,-50%) scale(1.05); box-shadow:0 0 25px rgba(255,255,255,0.6); }
#gyroBtn.hidden{ opacity:0; pointer-events:none; transform:translate(-50%,-50%) scale(0.8);}
@keyframes pulseBtn{0%,100%{transform:translate(-50%,-50%) scale(1); box-shadow:0 0 15px rgba(255,255,255,0.5);}50%{transform:translate(-50%,-50%) scale(1.08); box-shadow:0 0 25px rgba(255,255,255,0.6);}}
#gyroOverlay { position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:99998;pointer-events:none;opacity:0;transition:opacity 0.3s ease; }
#gyroOverlay.active { opacity:1; }

</style>
</head>
<body data-time="giorno">

<!-- LOADER -->
<div id="loader"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png" alt="CATMA Logo"></div>

<!-- MENU DESKTOP -->
<div id="menu">
<a href="#" data-key="chi">CHI SIAMO</a>
<a href="#" data-key="mescita">MESCITA</a>
<div class="logo-center"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png"></div>
<a href="#" data-key="bar">BAR</a>
<a href="#" data-key="eventi">EVENTI</a>
</div>

<!-- MOBILE LOGO + HAMBURGER -->
<img id="mobile-logo" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792905/Logo-Catma_dvrs0m.png">
<div id="hamburger"><div></div><div></div><div></div></div>

<!-- MOBILE MENU OVERLAY -->
<div id="mobile-menu">
  <div class="close-btn">&times;</div>
  <a href="#" data-key="chi">CHI SIAMO</a>
  <a href="#" data-key="mescita">MESCITA</a>
  <a href="#" data-key="bar">BAR</a>
  <a href="#" data-key="eventi">EVENTI</a>
  <a href="#" class="cta" data-key="prenota">PRENOTA</a>
</div>

<!-- HERO TEXT -->
<div id="hero-text">
  <h2 class="title">BENVENUTI AL</h2>
  <h1 class="title-big">CATMA BAR</h1>
  <p class="subtitle">Via delle Sirene, 13 - Lido di Jesolo (VE)</p>
</div>

<!-- HERO LAYERS + HOTSPOTS -->
<div id="hero">
  <!-- Layers Desktop -->
  <img class="layer desktop-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774788111/Catma-background_eogx6v.webp">
  <img class="layer desktop-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774821283/Catma-midground_zjbznb.webp">
  <img class="layer desktop-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774789061/Catma-foreground_o2hzoy.webp">
  <!-- Layers Mobile -->
  <img class="layer mobile-layer background parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774791189/Catma-background-mobile_oqmkn0.webp">
  <img class="layer mobile-layer midground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774792265/Catma-midground-mobile_xvwur8.webp">
  <img class="layer mobile-layer foreground parallax-target" src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802973/Catma-foreground-mobile_wpnzl9.webp">

  <!-- Hotspot Layer -->
  <div id="hotspot-layer">
    <div class="hotspot" data-key="chi" data-x-desktop="10" data-y-desktop="40" data-x-mobile="5" data-y-mobile="45"></div>
    <div class="hotspot" data-key="mescita" data-x-desktop="27" data-y-desktop="68" data-x-mobile="5" data-y-mobile="60"></div>
    <div class="hotspot cta-btn" data-key="prenota" data-x-desktop="50" data-y-desktop="55" data-x-mobile="50" data-y-mobile="50">PRENOTA</div>
    <div class="hotspot" data-key="eventi" data-x-desktop="85" data-y-desktop="45" data-x-mobile="95" data-y-mobile="50"></div>
    <div class="hotspot" data-key="bar" data-x-desktop="85" data-y-desktop="65" data-x-mobile="90" data-y-mobile="65"></div>
  </div>
</div>

<!-- OVERLAY CONTENT -->
<div id="content-overlay">
  <div class="close-btn">&times;</div>
  <div class="content-box"></div>
</div>

<!-- PULSANTI TEMPO -->
<div id="timeControls">
  <button data-time="giorno">GIORNO</button>
  <button data-time="sera">SERA</button>
  <button data-time="chiuso">CHIUSO</button>
</div>

<!-- FOOTER -->
<footer>
  <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
    <div style="padding:10px; font-size:10px; width:100%; text-align:center;">Via delle Sirene 13, Lido di Jesolo (VE) | P.IVA: 01234567890</div>
    <div class="footer-social">
      <a href="https://www.instagram.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-01_n8pedz.png" alt="Instagram"></a>
      <a href="https://www.facebook.com/" target="_blank"><img src="https://res.cloudinary.com/dkni7ncod/image/upload/v1774802166/ico-02_qpgtp7.png" alt="Facebook"></a>
    </div>
  </div>
  <div style="text-align:center; margin-top:8px; font-size:10px; padding:10px; background:#000">&copy; <span id="year"></span> Catma Bar. Tutti i diritti riservati.</div>
</footer>

<!-- CURSORE -->
<div id="custom-cursor"></div>

<script>
/* ================= LOADER ================= */
window.addEventListener('load', ()=>{ 
  setTimeout(()=>{ document.getElementById('loader').classList.add('hidden'); }, 600);
});

/* ================= CURSORE ================= */
const cursor = document.getElementById('custom-cursor');
document.addEventListener('mousemove', e => {
  cursor.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
});

/* ================= MENU MOBILE ================= */
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobile-menu');
const mobileClose = mobileMenu.querySelector('.close-btn');

hamburger.addEventListener('click', ()=> mobileMenu.style.display='flex');
mobileClose.addEventListener('click', ()=> mobileMenu.style.display='none');

/* ================= TIME FILTERS ================= */
document.querySelectorAll('#timeControls button').forEach(btn=>{
  btn.addEventListener('click', e=>{
    document.body.setAttribute('data-time', btn.dataset.time);
  });
});

/* ================= HOTSPOTS ================= */
function positionHotspots(){
  const hotspots = document.querySelectorAll('.hotspot');
  const w = window.innerWidth;
  const mobile = w<=768;
  hotspots.forEach(h=>{
    const x = mobile ? h.dataset.xMobile : h.dataset.xDesktop;
    const y = mobile ? h.dataset.yMobile : h.dataset.yDesktop;
    h.style.left = x+'%'; h.style.top = y+'%';
  });
}
window.addEventListener('resize', positionHotspots);
positionHotspots();

/* ================= OVERLAY ================= */
const overlay = document.getElementById('content-overlay');
const overlayClose = overlay.querySelector('.close-btn');
const overlayBox = overlay.querySelector('.content-box');

document.querySelectorAll('.hotspot, .hotspot.cta-btn').forEach(h=>{
  h.addEventListener('click', ()=>{
    overlay.classList.add('active');
    overlayBox.innerHTML = `<h2>${h.dataset.key.toUpperCase()}</h2><p>Contenuto per ${h.dataset.key}</p>`;
  });
});
overlayClose.addEventListener('click', ()=>overlay.classList.remove('active'));

/* ================= PARALLASSE ================= */
document.addEventListener('mousemove', e=>{
  document.querySelectorAll('.parallax-target').forEach(layer=>{
    const speed = layer.classList.contains('foreground') ? 0.04 : layer.classList.contains('midground') ? 0.02 : 0.01;
    const x = (window.innerWidth/2 - e.clientX)*speed;
    const y = (window.innerHeight/2 - e.clientY)*speed;
    layer.style.transform = `translate(${x}px,${y}px) scale(1)`;
  });
});

/* ================= GIROSCOPIO ================= */
if(window.DeviceOrientationEvent){
  const gyroBtn = document.createElement('button');
  gyroBtn.id='gyroBtn';
  gyroBtn.innerText='ATTIVA GIROSCOPIO';
  document.body.appendChild(gyroBtn);
  const gyroOverlay = document.createElement('div');
  gyroOverlay.id='gyroOverlay'; document.body.appendChild(gyroOverlay);
  gyroBtn.addEventListener('click', ()=>{
    gyroBtn.classList.add('hidden');
    gyroOverlay.classList.add('active');
    window.addEventListener('deviceorientation', e=>{
      document.querySelectorAll('.parallax-target').forEach(layer=>{
        const speed = layer.classList.contains('foreground') ? 0.08 : layer.classList.contains('midground') ? 0.04 : 0.02;
        const x = e.gamma*speed*5; const y = e.beta*speed*5;
        layer.style.transform = `translate(${x}px,${y}px) scale(1)`;
      });
    });
  });
}

/* ================= ANNO FOOTER ================= */
document.getElementById('year').innerText=new Date().getFullYear();
</script>
