  <style>
    /* =========================================
       VARIABILI COLORE DINAMICHE
       ========================================= */
    :root {
      --main-color: #b22222; 
      --shadow-color: rgba(178,34,34,0.6);
      --shadow-strong: rgba(178,34,34,0.9);
    }
    body[data-time="giorno"] { --main-color: #d83a3a; --shadow-color: rgba(216,58,58,0.6); --shadow-strong: rgba(216,58,58,0.9); }
    body[data-time="sera"] { --main-color: #b22222; --shadow-color: rgba(178,34,34,0.6); --shadow-strong: rgba(178,34,34,0.9); }
    body[data-time="chiuso"] { --main-color: #7a1515; --shadow-color: rgba(122,21,21,0.6); --shadow-strong: rgba(122,21,21,0.9); }

    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
    body, body * { -webkit-user-select: none; user-select: none; cursor: none !important; }

    /* =========================================
       CURSORE E LOADER
       ========================================= */
    #custom-cursor {
      position: fixed; top: 0; left: 0; width: 25px; height: 25px; background: black;
      border-radius: 50%; pointer-events: none; transform: translate3d(-50%, -50%, 0);
      z-index: 99999; transition: transform 0.1s ease, background 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 10px 3px var(--shadow-color); will-change: transform;
    }

    #loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--main-color); 
      display: flex; justify-content: center; align-items: center; z-index: 999999;
      transition: transform 0.8s ease;
    }
    #loader img { width: 150px; animation: rotateLogo 1s linear infinite; }
    @keyframes rotateLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    #loader.hidden { transform: translateY(-100%); pointer-events: none; }

    /* =========================================
       SCENA E LAYERS
       ========================================= */
    #hero { width: 100%; height: 100vh; position: relative; overflow: hidden; }
    #hero-layers { position: absolute; width: 100%; height: 100%; z-index: 10; transition: filter 0.5s ease; }
    .layer {
      position: absolute; width: 125%; height: 125%; top: -12.5%; left: -12.5%; object-fit: cover;
      pointer-events: none; transition: opacity 0.5s ease; will-change: transform; 
    }
    .layer.smooth-zoom { transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease, filter 0.3s ease !important; }
    .layer.is-moving { filter: blur(5px) !important; }

    /* PARTICELLE BILANCIATE */
    #particles-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 40; overflow: hidden; }
    .particle { position: absolute; background: #fff; border-radius: 50%; opacity: 0; animation: floatParticle linear infinite; filter: blur(1.5px); }
    @keyframes floatParticle {
      0% { transform: translate3d(0, 0, 0); opacity: 0; }
      20% { opacity: 0.45; }
      80% { opacity: 0.45; }
      100% { transform: translate3d(40px, -200px, 0); opacity: 0; }
    }

    /* =========================================
       TESTI CENTRALI E AUDIO TOGGLE
       ========================================= */
    #hero-text {
      position: absolute; width: 100%; top: 150px; left: 50%; transform: translateX(-50%); text-align: center; color: #fff;
      z-index: 90; pointer-events: none; text-shadow: 1px 1px 5px #000; transition: opacity 0.25s ease;
    }
    #hero-text .subtitle { font-size: 1.5vw; margin-top: 25px; opacity: 0.8; }
    #hero-text .title { font-size: 3vw; margin: 5px 0 0 0; font-weight: bold; animation: glowBreath 3s ease-in-out infinite; }
    #hero-text .title-big { font-size: 6vw; margin: 0; font-weight: bold; animation: glowBreath 3s infinite; }
    @keyframes glowBreath { 
      0%, 100% { text-shadow: 0 0 10px var(--shadow-color); } 
      50% { text-shadow: 0 0 25px var(--shadow-strong); } 
    }

    #audio-toggle {
      position: fixed; bottom: 100px; left: 20px; z-index: 600; width: 45px; height: 45px; border-radius: 50%; 
      background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; cursor: pointer;
      backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); color: #fff; transition: all 0.3s ease;
    }
    #audio-toggle:hover { transform: scale(1.1); }
    #audio-toggle.playing { background: var(--main-color); border-color: var(--main-color); }
    #audio-toggle svg { width: 22px; height: 22px; fill: currentColor; }
    #audio-toggle .icon-on { display: none; }
    #audio-toggle.playing .icon-on { display: block; }
    #audio-toggle.playing .icon-off { display: none; }

    /* =========================================
       HOTSPOTS (DOPPIO CONTROLLO RISOLTO)
       ========================================= */
    .hotspot {
      position: absolute; width: 50px; height: 50px; border-radius: 50%; background: var(--main-color);
      box-shadow: 0 0 20px var(--shadow-strong); animation: pulse 2s infinite;
      z-index: 50; cursor: pointer; transition: opacity 0.3s ease;
    }
    .hotspot.hidden { opacity: 0; pointer-events: none; }
    
    /* L'animazione muove solo ombra e scala, il JS gestisce left/top in tempo reale! */
    @keyframes pulse { 
      0%, 100% { transform: translate3d(-50%,-50%, 0) scale(1); box-shadow: 0 0 15px var(--shadow-color); } 
      50% { transform: translate3d(-50%,-50%, 0) scale(1.1); box-shadow: 0 0 30px var(--shadow-strong); } 
    }
    
    .hotspot[data-key="prenota"] {
      width: auto !important; min-width: 110px; height: 45px; border-radius: 30px !important;
      padding: 0 15px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #fff; font-size: 13px;
    }

    .hotspot-label {
      position: absolute; background: var(--main-color); color: #fff; padding: 8px 16px; border-radius: 12px;
      font-weight: bold; font-size: 14px; top: 50%; left: 50%; transform: translate3d(-50%, -20px, 0) scale(0); opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; z-index: 100;
    }
    .hotspot-label::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); border: 10px solid transparent; border-top-color: var(--main-color); }
    .hotspot:hover .hotspot-label, .hotspot-label.active { opacity: 1 !important; transform: translate3d(-50%, calc(-100% - 35px), 0) scale(1) !important; }

    /* =========================================
       POPUP E CONTENUTI
       ========================================= */
    #content-overlay {
      position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,.5); display: flex;
      justify-content: center; align-items: center; z-index: 9000; backdrop-filter: blur(8px); opacity: 0; visibility: hidden; transition: 0.4s;
    }
    #content-overlay.active { opacity: 1; visibility: visible; }
    .content-box { color: #fff; text-align: center; transform: scale(0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    #content-overlay.active .content-box { transform: scale(1); }
    .close-btn { position: absolute; top: 30px; right: 30px; font-size: 3rem; color: #fff; cursor: pointer; pointer-events: auto; z-index: 9001; transition: color 0.3s; }
    .close-btn:hover { color: var(--main-color); }

    .elegant-content { padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .stagger-item { opacity: 0; transform: translateY(20px); transition: 0.6s; }
    .elegant-content.show .stagger-item { opacity: 1; transform: translateY(0); }
    .stagger-1 { transition-delay: 0.1s; } .stagger-2 { transition-delay: 0.2s; } .stagger-3 { transition-delay: 0.3s; } .stagger-4 { transition-delay: 0.4s; }

    .elegant-title { font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; margin: 0 0 10px 0; font-weight: 300; }
    .elegant-divider { width: 50px; height: 2px; background-color: var(--main-color); margin-bottom: 20px; }
    .elegant-desc { font-size: 1.1rem; line-height: 1.6; max-width: 400px; font-weight: 300; opacity: 0.9; }
    .dynamic-badge { display: inline-block; padding: 5px 12px; border: 1px solid var(--main-color); border-radius: 20px; font-size: 0.9rem; margin-top: 15px; font-weight: bold;}
    
    .cta-group { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
    .cta-btn { border: 2px solid #fff; padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: 600; background: rgba(0,0,0,0.5); color: #fff; transition: all 0.25s ease; cursor: none; }
    .cta-btn:hover { background: var(--main-color); border-color: var(--main-color); transform: scale(1.05); box-shadow: 0 0 25px var(--shadow-strong); }
    .cta-btn.secondary { background: transparent; border: 1px solid rgba(255,255,255,0.4); }

    /* =========================================
       NAVBAR E MENU MOBILE
       ========================================= */
    #menu { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 90%; display: flex; align-items: center; z-index: 100; }
    #menu a { flex: 1; text-align: center; color: #fff; text-decoration: none; font-weight: bold; letter-spacing: 1px; transition: color 0.3s;}
    #menu a:hover { color: var(--main-color); }
    .logo-center { flex: 1; display: flex; justify-content: center; }
    .logo-center img { height: 60px; }
    #mobile-logo { display: none; position: absolute; top: 20px; left: 20px; height: 40px; z-index: 101; }
    
    #hamburger { display: none; position: absolute; top: 25px; right: 25px; width: 30px; height: 22px; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 801; }
    #hamburger div { height: 3px; background: #fff; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); transform-origin: left center; }
    #hamburger.open div:nth-child(1) { transform: rotate(45deg) translate(0px, -2px); }
    #hamburger.open div:nth-child(2) { opacity: 0; width: 0; }
    #hamburger.open div:nth-child(3) { transform: rotate(-45deg) translate(0px, 2px); }

    #mobile-menu {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.70); backdrop-filter: blur(8px); display: flex; justify-content: center;
      align-items: center; flex-direction: column; z-index: 800; clip-path: circle(0px at calc(100% - 40px) 35px); transition: clip-path 0.6s cubic-bezier(0.77, 0, 0.175, 1); pointer-events: none;
    }
    #mobile-menu.open { clip-path: circle(150% at calc(100% - 40px) 35px); pointer-events: auto; }
    #mobile-menu a { color: #fff; margin: 15px 0; font-size: 1.5rem; text-decoration: none; text-transform: uppercase; letter-spacing: 2px;}

    /* =========================================
       FILTRI TEMPO
       ========================================= */
    #timeControls { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 650; }
    #timeControls button { padding: 6px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 15px; background: rgba(0,0,0,0.6); color: white; cursor: pointer; font-size: 11px; backdrop-filter: blur(4px); transition: all 0.3s ease; }
    #timeControls button:hover, #timeControls button.active-debug { background: var(--main-color); border-color: var(--main-color); }
    
    body[data-time="giorno"] #hero-layers { filter: brightness(1.1) contrast(1.05) saturate(0.35); }
    body[data-time="sera"] #hero-layers { filter: brightness(0.85) contrast(1.2) sepia(0.3) saturate(1.3) hue-rotate(-10deg); }
    body[data-time="chiuso"] #hero-layers { filter: brightness(0.4) contrast(1.2) saturate(0.4) sepia(0.5) hue-rotate(180deg); }

    /* =========================================
       FOOTER (ALLINEAMENTO SINGOLA RIGA)
       ========================================= */
    footer { background: #111; color: #ccc; width: 100vw; position: fixed; bottom: 0; left: 0; z-index: 500; display: flex; flex-direction: column; font-size: 13px; }
    
    .footer-top { display: flex; flex-direction: row; align-items: center; justify-content: center; padding: 10px 25px; background: var(--main-color); color: #fff; gap: 20px; transition: background-color 0.5s ease; }
    .footer-top-info p { margin: 0; font-weight: bold; letter-spacing: 0.5px; }
    
    .footer-social { display: flex; gap: 15px; align-items: center; }
    .footer-social img { width: 22px; height: 22px; filter: brightness(0) invert(1); transition: transform 0.2s; }
    .footer-social a:hover img { transform: scale(1.2); }
    
    .footer-bottom { 
      display: flex; flex-direction: row; align-items: center; justify-content: center; 
      padding: 10px 25px; background: #000; gap: 20px; text-align: center; 
    }
    .footer-links { display: flex; gap: 10px; align-items: center; }
    .footer-links a { color: #888; text-decoration: none; transition: color 0.2s;}
    .footer-links a:hover { color: #fff; }

    /* =========================================
       MEDIA QUERIES (MOBILE)
       ========================================= */
    @media (max-width: 768px) {
      #menu { display: none; } #hamburger { display: flex; } #mobile-logo { display: block; }
      #hero-text { top: 20%; } #hero-text .title-big { font-size: 12vw; }
      #hero-text .title { font-size: 6vw; } #hero-text .subtitle { font-size: 3vw; }
      #audio-toggle { bottom: 85px; left: 15px; width: 40px; height: 40px; }
      
      .footer-top { padding: 8px 10px; gap: 10px; font-size: 9px; justify-content: center; }
      .footer-top-info p { letter-spacing: 0; }
      .footer-social { gap: 10px; }
      .footer-social img { width: 16px; height: 16px; }
      
      .footer-bottom { padding: 8px 12px; font-size: 10px; gap: 10px; justify-content: center; }
    }
    @media (pointer: coarse), (max-width: 768px) { #custom-cursor { display: none !important; } }
    @media (min-width: 769px) { .mobile-layer { display: none; } }
  </style>
</head>

      chi: `<div class="elegant-content"><h1 class="elegant-title stagger-item stagger-1">Chi siamo</h1><div class="elegant-divider stagger-item stagger-2"></div><p class="elegant-desc stagger-item stagger-3">CATMA BAR è un punto di riferimento al Lido di Jesolo. Un rifugio per anime notturne, dove la ricerca musicale incontra la profonda cultura del bere di qualità, creando connessioni umane autentiche.</p></div>`,
      mescita: `<div class="elegant-content"><h1 class="elegant-title stagger-item stagger-1">Mescita</h1><div class="elegant-divider stagger-item stagger-2"></div><p class="elegant-desc stagger-item stagger-3">Una selezione rigorosa e appassionata di vini naturali che raccontano il territorio, birre artigianali di carattere e cocktail essenziali creati con materie prime d'eccellenza.</p></div>`,
      eventi: `<div class="elegant-content"><h1 class="elegant-title stagger-item stagger-1">Eventi</h1><div class="elegant-divider stagger-item stagger-2"></div><p class="elegant-desc stagger-item stagger-3">Il ritmo della notte prende vita qui. Dj set curati, performance dal vivo e serate speciali ogni settimana, per accompagnare i tuoi momenti di evasione.<br>{{EVENT_STATUS}}</p></div>`,
      bar: `<div class="elegant-content"><h1 class="elegant-title stagger-item stagger-1">Il Bar</h1><div class="elegant-divider stagger-item stagger-2"></div><p class="elegant-desc stagger-item stagger-3">Uno spazio intimo tra luce e ombra, progettato minuziosamente per farti vivere un'esperienza notturna avvolgente, accompagnato da vibrazioni uniche.</p></div>`,
      prenota: `<div class="elegant-content"><h1 class="elegant-title stagger-item stagger-1">Prenota un tavolo</h1><div class="elegant-divider stagger-item stagger-2"></div><p class="elegant-desc stagger-item stagger-3">Assicurati il tuo spazio esclusivo al Catma. Scrivici comodamente su WhatsApp oppure chiamaci direttamente per riservare un tavolo.</p><div class="cta-group stagger-item stagger-4"><a href="https://wa.me/393XXXXXXXXX?text=Ciao" target="_blank" class="cta-btn">WhatsApp</a><a href="tel:+393XXXXXXXXX" class="cta-btn secondary">Chiama</a></div></div>`
    };

    // PARTICELLE 
    function createParticles() {
      const container = document.getElementById('particles-container');
      const count = window.innerWidth <= 768 ? 25 : 50;
      for(let i=0; i<count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1.5;
        p.style.width = size + 'px'; p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 15 + 10) + 's';
        p.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(p);
      }
    }
    createParticles();

    // =========================================
    // MOTORE PARALLASSE 3D E FIX POSIZIONAMENTO
    // =========================================
    function setLayers() {
      const isMobile = window.innerWidth <= 768;
      layers = isMobile ? {
        background: heroLayers.querySelector('.mobile-layer.background'),
        midground: heroLayers.querySelector('.mobile-layer.midground'),
        foreground: heroLayers.querySelector('.mobile-layer.foreground')
      } : {
        background: heroLayers.querySelector('.desktop-layer.background'),
        midground: heroLayers.querySelector('.desktop-layer.midground'),
        foreground: heroLayers.querySelector('.desktop-layer.foreground')
      };
      updateHotspots();
    }

    function updateHotspots() {
      const isMobile = window.innerWidth <= 768;
      hotspots.forEach(h => {
        const ox = isMobile ? (parseFloat(h.dataset.xMobile)/100 * hero.clientWidth) : (parseFloat(h.dataset.xDesktop)/100 * hero.clientWidth);
        const oy = isMobile ? (parseFloat(h.dataset.yMobile)/100 * hero.clientHeight) : (parseFloat(h.dataset.yDesktop)/100 * hero.clientHeight);
        h.dataset.ox = ox; h.dataset.oy = oy;
      });
      renderParallax(targetX, targetY);
    }

    function renderParallax(x, y) {
      const maxOffset = { background:{x:30,y:15}, midground:{x:60,y:30}, foreground:{x:90,y:45} };
      const baseScale = ('ontouchstart' in window) ? 1.05 : 1;

      if(layers.background) layers.background.style.transform = `translate3d(${x*maxOffset.background.x}px, ${y*maxOffset.background.y}px, 0) scale(${baseScale})`;
      if(layers.midground) layers.midground.style.transform = `translate3d(${x*maxOffset.midground.x}px, ${y*maxOffset.midground.y}px, 0) scale(${baseScale})`;
      if(layers.foreground) layers.foreground.style.transform = `translate3d(${x*maxOffset.foreground.x}px, ${y*maxOffset.foreground.y}px, 0) scale(${baseScale})`;

      const refX = x * maxOffset.midground.x;
      const refY = y * maxOffset.midground.y;

      hotspots.forEach(h => {
        if(h.classList.contains('hidden')) return;
        const ox = parseFloat(h.dataset.ox);
        const oy = parseFloat(h.dataset.oy);
        
        // LA SOLUZIONE CHIAVE: posiziona l'hotspot usando left e top
        // in questo modo l'animazione css 'transform' si occuperà solo di centrarlo (-50%) e farlo pulsare (scale)
        h.style.left = `${ox + refX}px`;
        h.style.top = `${oy + refY}px`;
      });
    }

    function parallaxLoop() {
      if (!isZoomed) {
        currentX += (targetX - currentX) * 0.08;
        currentY += (targetY - currentY) * 0.08;
        renderParallax(currentX, currentY);
        rafId = requestAnimationFrame(parallaxLoop);
      }
    }
    rafId = requestAnimationFrame(parallaxLoop);

    hero.addEventListener('mousemove', e => {
      if('ontouchstart' in window) return;
      targetX = (e.clientX / window.innerWidth) - 0.5; targetY = (e.clientY / window.innerHeight) - 0.5;
    });

    // =========================================
    // ZOOM SICURO E AMPIO
    // =========================================
    function zoomTo(key) {
      playSfx(clickSfx);
      if(isZoomed) {
        contentBox.querySelector('.elegant-content').classList.remove('show');
        setTimeout(() => { contentBox.innerHTML = generateDynamicContent(key); contentBox.style.transform = 'scale(1)'; setTimeout(()=> contentBox.querySelector('.elegant-content').classList.add('show'), 50); }, 300);
        return;
      }
      const h = Array.from(hotspots).find(el => el.dataset.key === key);
      if(!h) return;

      isZoomed = true; cancelAnimationFrame(rafId);
      const tx = parseFloat(h.dataset.ox); const ty = parseFloat(h.dataset.oy);
      const cx = window.innerWidth / 2; const cy = window.innerHeight / 2;
      const dx = cx - tx; const dy = cy - ty;

      const limitX = window.innerWidth * 0.22; const limitY = window.innerHeight * 0.22;
      const safeDx = Math.max(-limitX, Math.min(limitX, dx));
      const safeDy = Math.max(-limitY, Math.min(limitY, dy));

      Object.values(layers).forEach(l => { if(l) l.classList.add('smooth-zoom', 'overlay-active', 'is-moving'); });
      setTimeout(() => Object.values(layers).forEach(l => { if(l) l.classList.remove('is-moving'); }), 800);

      setTimeout(() => {
        if(layers.background) layers.background.style.transform = `translate3d(${safeDx*1.1}px,${safeDy*1.1}px, 0) scale(1.2)`;
        if(layers.midground) layers.midground.style.transform = `translate3d(${safeDx*1.5}px,${safeDy*1.5}px, 0) scale(1.5)`;
        if(layers.foreground) layers.foreground.style.transform = `translate3d(${safeDx*2.2}px,${safeDy*2.2}px, 0) scale(2.2)`;
      }, 10);

      contentBox.innerHTML = generateDynamicContent(key);
      overlay.classList.add('active');
      setTimeout(() => { contentBox.style.transform = 'scale(1)'; setTimeout(() => contentBox.querySelector('.elegant-content').classList.add('show'), 100); }, 150);
      hotspots.forEach(hot => hot.classList.add('hidden'));
    }

    function generateDynamicContent(key) {
      let html = contentMap[key];
      if (key === 'eventi') {
        const now = new Date(); const day = now.getDay(); const hour = now.getHours();
        let eventMsg = `<span class="dynamic-badge">Prossimo evento: Venerdì alle 22:00.</span>`;
        if (day === 5 || day === 6) { 
          if (hour < 22) { let o = 22 - hour; eventMsg = `<span class="dynamic-badge">Oggi è ${day===5?'Venerdì':'Sabato'}, l'evento inizia tra ${o} or${o===1?'a':'e'}!</span>`; } 
          else { eventMsg = `<span class="dynamic-badge">La serata Eventi è in corso, ti aspettiamo!</span>`; }
        }
        html = html.replace('{{EVENT_STATUS}}', eventMsg);
      }
      return html;
    }

    function resetZoom() {
      contentBox.querySelector('.elegant-content').classList.remove('show');
      contentBox.style.transform = 'scale(0)';
      setTimeout(() => overlay.classList.remove('active'), 300);
      hotspots.forEach(hot => hot.classList.remove('hidden'));
      
      Object.values(layers).forEach(l => { if(l) { l.classList.remove('overlay-active'); l.classList.add('is-moving'); } });
      
      renderParallax(currentX, currentY);

      setTimeout(() => { 
        Object.values(layers).forEach(l => { if(l) l.classList.remove('smooth-zoom', 'is-moving'); }); 
        isZoomed = false; 
        rafId = requestAnimationFrame(parallaxLoop); 
      }, 800);
    }

    // EVENT LISTENER E MENU
    hotspots.forEach(h => { h.onclick = () => zoomTo(h.dataset.key); h.onmouseenter = () => playSfx(hoverSfx); });
    document.querySelectorAll('#menu a, #mobile-menu a').forEach(a => {
      a.onclick = e => { e.preventDefault(); zoomTo(a.dataset.key); document.getElementById('mobile-menu').classList.remove('open'); document.getElementById('hamburger').classList.remove('open'); };
      a.onmouseenter = () => playSfx(hoverSfx);
    });

    const hamburger = document.getElementById('hamburger'); const mobileMenu = document.getElementById('mobile-menu');
    hamburger.onclick = () => { playSfx(clickSfx); mobileMenu.classList.toggle('open'); hamburger.classList.toggle('open'); };
    overlay.querySelector('.close-btn').onclick = resetZoom;
    document.addEventListener('keydown', e => { if(e.key === 'Escape' && isZoomed) resetZoom(); });
    overlay.onclick = e => { if(!contentBox.contains(e.target)) resetZoom(); };
    overlay.querySelector('.close-btn').onclick = e => { e.stopPropagation(); resetZoom(); };

    // LABELS
    hotspots.forEach(h => {
      if(h.dataset.key !== 'prenota') {
        const label = document.createElement('div'); label.className = 'hotspot-label'; label.innerText = map[h.dataset.key].label; h.appendChild(label);
      }
      if('ontouchstart' in window) {
        h.onclick = e => {
          const l = h.querySelector('.hotspot-label');
          if(l) { const a = l.classList.contains('active'); document.querySelectorAll('.hotspot-label').forEach(x => x.classList.remove('active')); if(!a) l.classList.add('active'); }
          zoomTo(h.dataset.key); e.stopPropagation();
        };
      }
    });
    if('ontouchstart' in window) document.addEventListener('touchstart', e => { if(!e.target.closest('.hotspot')) document.querySelectorAll('.hotspot-label').forEach(l => l.classList.remove('active')); });

    // CURSORE
    const customCursor = document.createElement('div'); customCursor.id = 'custom-cursor'; document.body.appendChild(customCursor);
    document.addEventListener('mousemove', e => customCursor.style.transform = `translate3d(calc(-50% + ${e.clientX}px), calc(-50% + ${e.clientY}px), 0)`);
    document.addEventListener('mousedown', () => { customCursor.style.boxShadow = '0 0 15px 5px var(--shadow-strong)'; customCursor.style.width = '35px'; customCursor.style.height = '35px';});
    document.addEventListener('mouseup', () => { customCursor.style.boxShadow = '0 0 10px 3px var(--shadow-color)'; customCursor.style.width = '25px'; customCursor.style.height = '25px'; });

    // TIME VISUALS E DEBUG
    function setTimeVisuals(state) {
      document.body.setAttribute('data-time', state); void heroLayers.offsetWidth;
      const t = state === 'giorno' ? { title: "BUONGIORNO DA", titleBig: "CATMA BAR", subtitle: "Via delle Sirene, 13 - Lido di Jesolo (VE)" } : state === 'sera' ? { title: "BENVENUTI AL", titleBig: "CATMA BAR", subtitle: "Via delle Sirene, 13 - Lido di Jesolo (VE)" } : { title: "SEMBRA CHE <br> IL CATMA SIA", titleBig: "CHIUSO", subtitle: "Torna domani per bere un'altra ombra!" };
      const heroText = document.getElementById('hero-text'); heroText.style.opacity = 0;
      setTimeout(() => { heroText.innerHTML = `<h2 class="title">${t.title}</h2><h1 class="title-big">${t.titleBig}</h1><p class="subtitle">${t.subtitle}</p>`; heroText.style.opacity = 1; }, 250);
      document.querySelectorAll('#timeControls button').forEach(btn => btn.classList.remove('active-debug'));
      document.querySelector(`#timeControls button[data-time="${state}"]`).classList.add('active-debug');
    }
    function applyTimeFilter() { if (manualTimeOverride) return; const h = new Date().getHours(); setTimeVisuals((h >= 9 && h < 18) ? 'giorno' : (h >= 18 || h < 2) ? 'sera' : 'chiuso'); }
    document.querySelectorAll('#timeControls button').forEach(btn => btn.onclick = e => { manualTimeOverride = true; setTimeVisuals(e.target.dataset.time); });

    // CARICAMENTO INIT E RESIZE
    const loader = document.getElementById('loader'); const loaderStart = Date.now(); let isLoaderHidden = false;
    function tryHideLoader() { if (isLoaderHidden) return; setTimeout(() => { loader.classList.add('hidden'); isLoaderHidden = true; }, Math.max(2000 - (Date.now() - loaderStart), 0)); }
    window.onload = tryHideLoader; document.addEventListener('DOMContentLoaded', tryHideLoader);
    
    window.addEventListener('resize', () => { setLayers(); });
    
    setLayers(); applyTimeFilter(); setInterval(applyTimeFilter, 60*60*1000); 
  </script>
</body>
</html>
